<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" data-visual-quality="publication" data-text-fit="bounded">
<title>Retry policy trade-offs during correlated failures at 85 requests per second</title>
<desc>Two-panel chart showing successful request rate and peak attempts per second for five retry policies across 200 matched repeats.</desc>
<rect width="1200" height="675" fill="#F7F4EE"/>
<text x="64" y="62" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" fill="#17212B">Retries buy completion by spending incident capacity</text>
<text x="64" y="96" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#52606D">85 original requests/s · 100 attempts/s service capacity · correlated faults · 200 matched repeats</text>
<rect x="54" y="128" width="530" height="456" rx="10" fill="#FFFFFF" stroke="#D9D3C7"/>
<rect x="616" y="128" width="530" height="456" rx="10" fill="#FFFFFF" stroke="#D9D3C7"/>
<text x="82" y="170" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="650" fill="#17212B">Original requests completed</text>
<text x="644" y="170" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="650" fill="#17212B">Peak attempted calls per second</text>
<line x1="244" y1="198" x2="244" y2="520" stroke="#C8C1B5"/>
<line x1="806" y1="198" x2="806" y2="520" stroke="#C8C1B5"/>
<text x="82" y="234" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">No retry</text>
<rect x="244" y="216" width="92.4" height="26" rx="5" fill="#8DA3B8"/>
<text x="344.4" y="235" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#17212B">89.7%</text>
<text x="644" y="234" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">No retry</text>
<rect x="806" y="216" width="114.4" height="26" rx="5" fill="#8DA3B8"/>
<text x="928.4" y="235" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#17212B">118</text>
<text x="82" y="298" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">Immediate ×3</text>
<rect x="244" y="280" width="215.1" height="26" rx="5" fill="#ED6A5A"/>
<text x="467.1" y="299" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#17212B">96.0%</text>
<text x="644" y="298" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">Immediate ×3</text>
<rect x="806" y="280" width="269.7" height="26" rx="5" fill="#ED6A5A"/>
<text x="1083.7" y="299" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#17212B">277</text>
<text x="82" y="362" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">Backoff</text>
<rect x="244" y="344" width="234.1" height="26" rx="5" fill="#F4A261"/>
<text x="486.1" y="363" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#17212B">97.0%</text>
<text x="644" y="362" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">Backoff</text>
<rect x="806" y="344" width="242.3" height="26" rx="5" fill="#F4A261"/>
<text x="1056.3" y="363" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#17212B">249</text>
<text x="82" y="426" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">Backoff + jitter</text>
<rect x="244" y="408" width="231.8" height="26" rx="5" fill="#7B8CDE"/>
<text x="483.8" y="427" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#17212B">96.9%</text>
<text x="644" y="426" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">Backoff + jitter</text>
<rect x="806" y="408" width="256.2" height="26" rx="5" fill="#7B8CDE"/>
<text x="1070.2" y="427" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#17212B">263</text>
<text x="82" y="490" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">Budget + jitter</text>
<rect x="244" y="472" width="184.3" height="26" rx="5" fill="#2A9D8F"/>
<text x="436.3" y="491" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#17212B">94.5%</text>
<text x="644" y="490" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">Budget + jitter</text>
<rect x="806" y="472" width="130.5" height="26" rx="5" fill="#2A9D8F"/>
<text x="944.5" y="491" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#17212B">134</text>
<text x="244" y="550" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#6B7280">85%</text>
<text x="522" y="550" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#6B7280">100%</text>
<text x="806" y="550" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#6B7280">0</text>
<text x="1080" y="550" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#6B7280">300/s</text>
<rect x="54" y="606" width="1092" height="1" fill="#D9D3C7"/>
<text x="64" y="638" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#34404B">Budget + jitter cuts the retry peak 49% vs unbudgeted jitter, but gives up 2.4 completion points.</text>
<text x="1136" y="650" text-anchor="end" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#7B8188">mean of 200 repeats · simulated mechanism evidence</text>
</svg>
