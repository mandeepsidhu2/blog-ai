<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Agent trace gate comparison</title>
  <desc id="desc">Bar chart comparing final-summary, command-log, and trace-contract gates by accuracy, block recall, and false-negative rate.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="86" y="34" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Trace-contract gate reduces release-blocking false negatives</text>
  <line x1="86" y1="454" x2="920" y2="454" stroke="#94a3b8" stroke-width="1"/>
  <line x1="86" y1="60" x2="86" y2="454" stroke="#94a3b8" stroke-width="1"/>
  <text x="30" y="68" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">1.0</text>
  <text x="30" y="458" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">0.0</text>
  <rect x="122" y="380.125" width="46" height="73.875" rx="6" fill="#2563eb"><title>Final Summary Gate accuracy 0.188</title></rect>
<rect x="182" y="454" width="46" height="0" rx="6" fill="#16a34a"><title>Final Summary Gate block recall 0.000</title></rect>
<rect x="242" y="306.25" width="46" height="147.75" rx="6" fill="#dc2626"><title>Final Summary Gate false negatives 6</title></rect>
<text x="196" y="498" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a">Final Summary Gate</text>
<rect x="400" y="306.25" width="46" height="147.75" rx="6" fill="#2563eb"><title>Command Log Gate accuracy 0.375</title></rect>
<rect x="460" y="388.33333333333337" width="46" height="65.66666666666666" rx="6" fill="#16a34a"><title>Command Log Gate block recall 0.167</title></rect>
<rect x="520" y="330.875" width="46" height="123.125" rx="6" fill="#dc2626"><title>Command Log Gate false negatives 5</title></rect>
<text x="474" y="498" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a">Command Log Gate</text>
<rect x="678" y="84.625" width="46" height="369.375" rx="6" fill="#2563eb"><title>Trace Contract Gate accuracy 0.938</title></rect>
<rect x="738" y="60" width="46" height="394" rx="6" fill="#16a34a"><title>Trace Contract Gate block recall 1.000</title></rect>
<rect x="798" y="454" width="46" height="0" rx="6" fill="#dc2626"><title>Trace Contract Gate false negatives 0</title></rect>
<text x="752" y="498" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a">Trace Contract Gate</text>
  <rect x="598" y="64" width="18" height="18" rx="4" fill="#2563eb"/>
  <text x="624" y="78" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">accuracy</text>
  <rect x="704" y="64" width="18" height="18" rx="4" fill="#16a34a"/>
  <text x="730" y="78" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">block recall</text>
  <rect x="832" y="64" width="18" height="18" rx="4" fill="#dc2626"/>
  <text x="858" y="78" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">FN rate</text>
</svg>
