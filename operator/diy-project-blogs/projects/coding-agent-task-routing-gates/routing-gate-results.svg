<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Coding-agent routing policy comparison</title>
  <desc id="desc">Bar chart comparing delegate-all, human-review-only, and task-gate routing policies by pass rate, route match, compute credits, and review hours.</desc>
  <rect width="960" height="540" fill="#f8faf7"/>
  <text x="36" y="46" class="title">Coding-agent task routing gates</text>
  <text x="36" y="72" class="subtitle">Higher pass and match are better; lower credits and review hours are better.</text>
  
      <g transform="translate(0 92)">
        <text x="36" y="24" class="label">delegateAll</text>
        <rect x="170" y="0" width="110" height="18" rx="3" fill="#167c6b"/>
        <text x="290" y="14" class="metric">pass 0.438</text>
        <rect x="170" y="28" width="110" height="18" rx="3" fill="#275dad"/>
        <text x="290" y="42" class="metric">match 0.438</text>
        <rect x="170" y="56" width="250" height="18" rx="3" fill="#b86125"/>
        <text x="430" y="70" class="metric">credits 42.88</text>
        <rect x="170" y="84" width="156" height="18" rx="3" fill="#6c4bb5"/>
        <text x="336" y="98" class="metric">review 18.21h</text>
      </g>

      <g transform="translate(0 202)">
        <text x="36" y="24" class="label">humanReviewOnly</text>
        <rect x="170" y="0" width="141" height="18" rx="3" fill="#167c6b"/>
        <text x="321" y="14" class="metric">pass 0.563</text>
        <rect x="170" y="28" width="156" height="18" rx="3" fill="#275dad"/>
        <text x="336" y="42" class="metric">match 0.625</text>
        <rect x="170" y="56" width="196" height="18" rx="3" fill="#b86125"/>
        <text x="376" y="70" class="metric">credits 33.67</text>
        <rect x="170" y="84" width="250" height="18" rx="3" fill="#6c4bb5"/>
        <text x="430" y="98" class="metric">review 29.21h</text>
      </g>

      <g transform="translate(0 312)">
        <text x="36" y="24" class="label">taskGate</text>
        <rect x="170" y="0" width="172" height="18" rx="3" fill="#167c6b"/>
        <text x="352" y="14" class="metric">pass 0.688</text>
        <rect x="170" y="28" width="188" height="18" rx="3" fill="#275dad"/>
        <text x="368" y="42" class="metric">match 0.75</text>
        <rect x="170" y="56" width="201" height="18" rx="3" fill="#b86125"/>
        <text x="381" y="70" class="metric">credits 34.45</text>
        <rect x="170" y="84" width="216" height="18" rx="3" fill="#6c4bb5"/>
        <text x="396" y="98" class="metric">review 25.21h</text>
      </g>
  <g transform="translate(36 470)">
    <rect width="16" height="16" fill="#167c6b" rx="2"/><text x="24" y="13" class="legend">pass rate</text>
    <rect x="132" width="16" height="16" fill="#275dad" rx="2"/><text x="156" y="13" class="legend">route match</text>
    <rect x="286" width="16" height="16" fill="#b86125" rx="2"/><text x="310" y="13" class="legend">compute credits</text>
    <rect x="470" width="16" height="16" fill="#6c4bb5" rx="2"/><text x="494" y="13" class="legend">review hours</text>
  </g>
  <style>
    .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .subtitle, .legend { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4f5b66; }
    .label { font: 650 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .metric { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #28323c; }
  </style>
</svg>