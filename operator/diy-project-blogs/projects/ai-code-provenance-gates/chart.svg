<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">AI code provenance gate comparison</title>
  <desc id="desc">Bar chart comparing tests-only and provenance release gates for AI-authored code changes.</desc>
  <rect width="980" height="520" fill="#f8fafc"/>
  <text x="48" y="58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">AI Code Provenance Gate Results</text>
  <text x="48" y="92" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Eight pull-request traces scored for trace evidence, tests, reviewer coverage, sensitive paths, and patch size.</text>

    <g transform="translate(96,130)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">tests-only gate</text>
      <rect x="0" y="155" width="72" height="125" fill="#2563eb"/>
      <text x="0" y="306" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">accuracy</text>
      <text x="8" y="143" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">0.50</text>
      <rect x="118" y="280" width="72" height="0" fill="#0f766e"/>
      <text x="104" y="306" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">review capture</text>
      <text x="126" y="268" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">0.00</text>
      <text x="236" y="82" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" fill="#b91c1c">4</text>
      <text x="236" y="110" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">unsafe merges</text>
      <text x="236" y="176" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" fill="#15803d">0</text>
      <text x="236" y="204" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">unneeded blocks</text>
    </g>
    <g transform="translate(516,130)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">provenance gate</text>
      <rect x="0" y="30" width="72" height="250" fill="#2563eb"/>
      <text x="0" y="306" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">accuracy</text>
      <text x="8" y="18" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">1.00</text>
      <rect x="118" y="30" width="72" height="250" fill="#0f766e"/>
      <text x="104" y="306" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">review capture</text>
      <text x="126" y="18" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">1.00</text>
      <text x="236" y="82" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" fill="#15803d">0</text>
      <text x="236" y="110" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">unsafe merges</text>
      <text x="236" y="176" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" fill="#15803d">0</text>
      <text x="236" y="204" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">unneeded blocks</text>
    </g>
</svg>
