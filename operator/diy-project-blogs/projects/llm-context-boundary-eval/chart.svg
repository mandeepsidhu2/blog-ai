<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LLM context boundary evaluation results</title>
  <desc id="desc">Bar chart showing decision accuracy, abstention accuracy, citation recall, mean score, and unsupported hallucination rate.</desc>
  <rect width="1600" height="900" fill="#f7f3ea"/>
  <rect x="80" y="74" width="1440" height="752" rx="28" fill="#10241f"/>
  <text x="150" y="158" fill="#f5d46c" font-family="Arial, sans-serif" font-size="54" font-weight="900">LLM Context Boundary Evaluation</text>
  <text x="150" y="214" fill="#d7e7dc" font-family="Arial, sans-serif" font-size="27">Local Qwen3.6 35B judged supported, unsupported, conflicting, and distractor-heavy questions.</text>
  <rect x="116" y="236" width="1248" height="525" rx="22" fill="#fffaf0"/>
  <rect x="150" y="270" width="202.4" height="420" rx="14" fill="#0f766e"/>
      <text x="251.2" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#fdfaf0">1</text>
      <text x="251.2" y="732" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#24342f">decision accuracy</text>
<rect x="394.4" y="270" width="202.4" height="420" rx="14" fill="#2563eb"/>
      <text x="495.59999999999997" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#fdfaf0">1</text>
      <text x="495.59999999999997" y="732" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#24342f">abstention accuracy</text>
<rect x="638.8" y="348.54" width="202.4" height="341.46" rx="14" fill="#7c3aed"/>
      <text x="740" y="330.54" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#fdfaf0">0.81</text>
      <text x="740" y="732" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#24342f">citation recall</text>
<rect x="883.2" y="323.76" width="202.4" height="366.24" rx="14" fill="#d97706"/>
      <text x="984.4000000000001" y="305.76" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#fdfaf0">0.87</text>
      <text x="984.4000000000001" y="732" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#24342f">mean score</text>
<rect x="1127.6" y="686" width="202.4" height="4" rx="14" fill="#dc2626"/>
      <text x="1228.8" y="668" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#fdfaf0">0</text>
      <text x="1228.8" y="732" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#24342f">unsupported hallucination</text>
  <text x="150" y="780" fill="#d7e7dc" font-family="Arial, sans-serif" font-size="25">Lower unsupported hallucination is better. All values are computed from 8 local evaluation cases.</text>
</svg>
