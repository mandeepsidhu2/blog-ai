<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540"><title>Orphaned worker time under fan-out cancellation policies</title><desc>Bar chart of measured orphan worker seconds per parent request in the bursty scenario, with success rates for four cancellation policies.</desc><rect width="960" height="540" fill="#081525"/><style>.title{font:700 28px ui-monospace,monospace;fill:#f4f7fb}.sub{font:16px ui-monospace,monospace;fill:#a9bdd4}.label{font:700 15px ui-monospace,monospace;fill:#e8eef7}.small{font:13px ui-monospace,monospace;fill:#9eb3ca}.value{font:700 17px ui-monospace,monospace;fill:#f8fbff}</style><text x="60" y="62" class="title">Cancel the work the parent no longer needs</text><text x="60" y="92" class="sub">Bursty workload · 24 workers · six-way fan-out · six-second parent deadline</text><line x1="80" y1="390" x2="875" y2="390" stroke="#5d728b"/><line x1="80" y1="145" x2="80" y2="390" stroke="#5d728b"/><text x="28" y="270" class="small" transform="rotate(-90 28 270)">orphan worker-seconds / parent</text><rect x="115" y="95.77472821807311" width="86" height="294.2252717819269" fill="#ff8a65"/><text x="158" y="79.77472821807311" text-anchor="middle" class="value">5.45s</text><text x="158" y="420" text-anchor="middle" class="label">No cancel</text><text x="158" y="445" text-anchor="middle" class="small">37.6% success</text><rect x="305" y="224.55285367783387" width="86" height="165.44714632216613" fill="#ffd166"/><text x="348" y="208.55285367783387" text-anchor="middle" class="value">3.06s</text><text x="348" y="420" text-anchor="middle" class="label">Queued only</text><text x="348" y="445" text-anchor="middle" class="small">42.1% success</text><rect x="495" y="318.9957702942529" width="86" height="71.00422970574711" fill="#72d6c9"/><text x="538" y="302.9957702942529" text-anchor="middle" class="value">1.31s</text><text x="538" y="420" text-anchor="middle" class="label">Coop 1 s</text><text x="538" y="445" text-anchor="middle" class="small">44.8% success</text><rect x="685" y="371.2199242109254" width="86" height="18.780075789074615" fill="#55a7ff"/><text x="728" y="355.2199242109254" text-anchor="middle" class="value">0.35s</text><text x="728" y="420" text-anchor="middle" class="label">Coop 250 ms</text><text x="728" y="445" text-anchor="middle" class="small">46.2% success</text><rect x="610" y="112" width="270" height="84" rx="8" fill="#10253c" stroke="#294866"/><text x="630" y="142" class="label">Decision signal</text><text x="630" y="168" class="small">Compare reclaimed work and success;</text><text x="630" y="188" class="small">latency among survivors is insufficient.</text></svg>
