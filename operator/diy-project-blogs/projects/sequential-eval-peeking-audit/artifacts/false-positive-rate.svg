<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 630" role="img">
<title>False-positive rate under repeated evaluation peeking</title>
<desc>Line chart showing false-positive rates for fixed-horizon, naive repeated peeking, and Bonferroni-controlled peeking over four review cadences at 400 paired tasks.</desc>
<rect width="1120" height="630" fill="#0d1117"/>
<text x="70" y="62" class="title">Repeated peeking can triple the false-positive rate</text>
<text x="70" y="94" class="sub">Null effect · 20,000 Monte Carlo repeats per cell · paired binary outcomes · max n=400</text>
<line x1="150" y1="490" x2="900" y2="490" stroke="#8b949e"/><line x1="150" y1="160" x2="150" y2="490" stroke="#8b949e"/>
<line x1="150" y1="490" x2="900" y2="490" stroke="#30363d"/><text x="135" y="495" text-anchor="end" class="axis">0%</text><line x1="150" y1="415" x2="900" y2="415" stroke="#30363d"/><text x="135" y="420" text-anchor="end" class="axis">5%</text><line x1="150" y1="340" x2="900" y2="340" stroke="#30363d"/><text x="135" y="345" text-anchor="end" class="axis">10%</text><line x1="150" y1="265" x2="900" y2="265" stroke="#30363d"/><text x="135" y="270" text-anchor="end" class="axis">15%</text><line x1="150" y1="190" x2="900" y2="190" stroke="#30363d"/><text x="135" y="195" text-anchor="end" class="axis">20%</text>
<text x="220" y="525" text-anchor="middle" class="axis">every 10</text><text x="430" y="525" text-anchor="middle" class="axis">every 25</text><text x="640" y="525" text-anchor="middle" class="axis">every 50</text><text x="850" y="525" text-anchor="middle" class="axis">every 100</text>
<text x="520" y="570" text-anchor="middle" class="axis">Significance review cadence (tasks)</text><text transform="translate(48 330) rotate(-90)" text-anchor="middle" class="axis">False-positive rate</text>
<polyline fill="none" stroke="#58a6ff" stroke-width="4" points="220,414.625 430,411.025 640,415.375 850,416.35"/><circle cx="220" cy="414.625" r="7" fill="#58a6ff"/><text x="220" y="401.625" text-anchor="middle" class="value">5.0%</text><circle cx="430" cy="411.025" r="7" fill="#58a6ff"/><text x="430" y="398.025" text-anchor="middle" class="value">5.3%</text><circle cx="640" cy="415.375" r="7" fill="#58a6ff"/><text x="640" y="402.375" text-anchor="middle" class="value">5.0%</text><circle cx="850" cy="416.35" r="7" fill="#58a6ff"/><text x="850" y="403.35" text-anchor="middle" class="value">4.9%</text><polyline fill="none" stroke="#ff7b72" stroke-width="4" points="220,66.02499999999998 430,145.75 640,235.67499999999998 850,293.57499999999993"/><circle cx="220" cy="66.02499999999998" r="7" fill="#ff7b72"/><text x="220" y="53.02499999999998" text-anchor="middle" class="value">28.3%</text><circle cx="430" cy="145.75" r="7" fill="#ff7b72"/><text x="430" y="132.75" text-anchor="middle" class="value">22.9%</text><circle cx="640" cy="235.67499999999998" r="7" fill="#ff7b72"/><text x="640" y="222.67499999999998" text-anchor="middle" class="value">17.0%</text><circle cx="850" cy="293.57499999999993" r="7" fill="#ff7b72"/><text x="850" y="280.57499999999993" text-anchor="middle" class="value">13.1%</text><polyline fill="none" stroke="#3fb950" stroke-width="4" points="220,479.875 430,466.45 640,455.725 850,439.675"/><circle cx="220" cy="479.875" r="7" fill="#3fb950"/><text x="220" y="466.875" text-anchor="middle" class="value">0.7%</text><circle cx="430" cy="466.45" r="7" fill="#3fb950"/><text x="430" y="453.45" text-anchor="middle" class="value">1.6%</text><circle cx="640" cy="455.725" r="7" fill="#3fb950"/><text x="640" y="442.725" text-anchor="middle" class="value">2.3%</text><circle cx="850" cy="439.675" r="7" fill="#3fb950"/><text x="850" y="426.675" text-anchor="middle" class="value">3.4%</text>
<rect x="930" y="190" width="18" height="18" fill="#58a6ff"/><text x="960" y="205" class="legend">Fixed horizon</text><rect x="930" y="245" width="18" height="18" fill="#ff7b72"/><text x="960" y="260" class="legend">Naive peeking</text><rect x="930" y="300" width="18" height="18" fill="#3fb950"/><text x="960" y="315" class="legend">Bonferroni peeking</text>
<style>.title{font:700 27px ui-monospace,monospace;fill:#f0f6fc}.sub{font:15px ui-monospace,monospace;fill:#8b949e}.axis,.legend{font:14px ui-monospace,monospace;fill:#c9d1d9}.value{font:700 13px ui-monospace,monospace;fill:#f0f6fc}</style>
</svg>