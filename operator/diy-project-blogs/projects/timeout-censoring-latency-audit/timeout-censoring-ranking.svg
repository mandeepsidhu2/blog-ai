<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc" data-visual-quality="publication" data-text-fit="bounded">
<title id="title">Timeout censoring reverses the latency ranking</title><desc id="desc">Completed-only p95 makes the fast but spiky endpoint appear faster, while deadline-aware p95 exposes its six percent timeout tail across deadline settings.</desc>
<rect width="1200" height="630" fill="#09131f"/><text x="72" y="64" fill="#f4f1e8" font-family="Georgia,serif" font-size="32" font-weight="700">Completed-only latency hides the failed tail</text><text x="72" y="98" fill="#a7b8c9" font-family="Georgia,serif" font-size="17">240 repeats × 5,000 requests; same random draws within each repeat</text>
<rect x="70" y="125" width="960" height="420" rx="8" fill="#101f2e" stroke="#294158"/><g stroke="#294158" stroke-width="1"><line x1="150" y1="404" x2="990" y2="404"/><text x="105" y="409" fill="#8fa4b8" font-family="Georgia,serif" font-size="14">4s</text><line x1="150" y1="308" x2="990" y2="308"/><text x="105" y="313" fill="#8fa4b8" font-family="Georgia,serif" font-size="14">8s</text><line x1="150" y1="212" x2="990" y2="212"/><text x="105" y="217" fill="#8fa4b8" font-family="Georgia,serif" font-size="14">12s</text><line x1="150" y1="116" x2="990" y2="116"/><text x="105" y="121" fill="#8fa4b8" font-family="Georgia,serif" font-size="14">16s</text></g>
<text x="150" y="525" fill="#a7b8c9" font-family="Georgia,serif" font-size="14">deadline</text><text x="252" y="525" fill="#d5dde5" font-family="Georgia,serif" font-size="15">2s</text><text x="467" y="525" fill="#d5dde5" font-family="Georgia,serif" font-size="15">4s</text><text x="682" y="525" fill="#d5dde5" font-family="Georgia,serif" font-size="15">8s</text><text x="897" y="525" fill="#d5dde5" font-family="Georgia,serif" font-size="15">16s</text>
<path d="M 260 453.7 L 475 442.1 L 690 442.1 L 905 442.1" fill="none" stroke="#72d6c9" stroke-width="4"/><circle cx="260" cy="453.7" r="6" fill="#72d6c9"/><circle cx="475" cy="442.1" r="6" fill="#72d6c9"/><circle cx="690" cy="442.1" r="6" fill="#72d6c9"/><circle cx="905" cy="442.1" r="6" fill="#72d6c9"/><path d="M 260 470.0 L 475 470.0 L 690 469.8 L 905 334.5" fill="none" stroke="#f6c85f" stroke-width="4"/><circle cx="260" cy="470.0" r="6" fill="#f6c85f"/><circle cx="475" cy="470.0" r="6" fill="#f6c85f"/><circle cx="690" cy="469.8" r="6" fill="#f6c85f"/><circle cx="905" cy="334.5" r="6" fill="#f6c85f"/><path d="M 260 452.0 L 475 404.2 L 690 308.7 L 905 276.1" fill="none" stroke="#ff7d73" stroke-width="5" stroke-dasharray="10 7"/><circle cx="260" cy="452.0" r="6" fill="#ff7d73"/><circle cx="475" cy="404.2" r="6" fill="#ff7d73"/><circle cx="690" cy="308.7" r="6" fill="#ff7d73"/><circle cx="905" cy="276.1" r="6" fill="#ff7d73"/>
<g font-family="Georgia,serif" font-size="16"><rect x="1050" y="165" width="18" height="4" fill="#72d6c9"/><text x="1080" y="172" fill="#d5dde5">steady p95</text><rect x="1050" y="207" width="18" height="4" fill="#f6c85f"/><text x="1080" y="214" fill="#d5dde5">spiky completed</text><rect x="1050" y="249" width="18" height="4" fill="#ff7d73"/><text x="1080" y="256" fill="#d5dde5">spiky deadline-aware</text></g>
<rect x="1045" y="320" width="120" height="126" rx="8" fill="#152a3d" stroke="#36536d"/><text x="1060" y="347" fill="#f4f1e8" font-family="Georgia,serif" font-size="15" font-weight="700">At 8 seconds</text><text x="1060" y="378" fill="#f6c85f" font-family="Georgia,serif" font-size="14">1.25s shown</text><text x="1060" y="402" fill="#ff7d73" font-family="Georgia,serif" font-size="14">8.00s aware</text><text x="1060" y="426" fill="#a7b8c9" font-family="Georgia,serif" font-size="13">~6% timeout</text>
<text x="72" y="590" fill="#8fa4b8" font-family="Georgia,serif" font-size="15">The dashed series replaces timed-out calls with the declared deadline; it is not an estimate beyond the censoring point.</text></svg>