    <text x="825" y="592" class="tick" text-anchor="middle">0.05</text><line x1="940" y1="204" x2="940" y2="565" class="grid"/>
    <text x="940" y="592" class="tick" text-anchor="middle">0.06</text>

    <text x="82" y="243" class="row-label">OWT 4M</text>
    <rect x="250" y="227" width="544.2170925438404" height="22" rx="5" fill="#14b8a6" opacity="0.82"/>
