<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title>Paired validation-loss gains from decaying dropout across six regimes</title>
  <desc>Horizontal bars show mean validation cross-entropy reduction with 95 percent bootstrap intervals for three datasets at four and eight million token prefixes. Every interval is above zero.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="1200" height="675" fill="#080c12"/>
    <rect width="1200" height="675" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <style>
    text { font-family: Inter, ui-sans-serif, system-ui, sans-serif; fill: #101720; }
    .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: 1px; fill: #5eead4; }
    .title { font-size: 35px; font-weight: 760; }
    .subtitle { font-size: 17px; fill: #a8b6ca; }
    .row-label { font-size: 17px; font-weight: 680; }
    .value { font-size: 16px; font-weight: 680; }
    .tick { font-size: 13px; fill: #91a1b7; }
    .grid { stroke: #26364c; stroke-width: 1; }
    .note { font-size: 14px; fill: #fda4af; }
  </style>
  <text x="70" y="66" class="eyebrow">MATCHED MULTI-SEED RESULT</text>
  <text x="70" y="112" class="title">Decay wins late, but not from the first token</text>
  <text x="70" y="146" class="subtitle">Paired gain over each seed's best static-dropout run; whiskers are stored 95% bootstrap intervals.</text>
  <rect x="67" y="177" width="1066" height="425" rx="8" fill="#0c1a2b" stroke="#24364d"/>
  <line x1="250" y1="204" x2="250" y2="565" class="grid"/>
    <text x="250" y="592" class="tick" text-anchor="middle">0.00</text><line x1="365" y1="204" x2="365" y2="565" class="grid"/>
    <text x="365" y="592" class="tick" text-anchor="middle">0.01</text><line x1="480" y1="204" x2="480" y2="565" class="grid"/>
