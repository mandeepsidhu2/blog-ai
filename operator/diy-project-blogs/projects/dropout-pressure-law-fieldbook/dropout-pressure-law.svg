    <text x="970" y="487" class="value">0.0252 nats</text>
    <text x="82" y="548" class="row-label">Wiki 8M</text>
    <rect x="250" y="532" width="168.41837453345454" height="22" rx="5" fill="#38bdf8" opacity="0.82"/>
