<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Agent permission gate policy comparison</title>
  <desc id="desc">Bar chart comparing open delegation, approval-only, and capability-gate policies by pass rate and risk cost.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="74" y="54" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Permission policy comparison</text>
  <text x="74" y="420" font-family="Arial, sans-serif" font-size="20" fill="#334155">Lower risk cost and fewer unsafe grants indicate a safer release gate.</text>
  <text x="74" y="456" font-family="Arial, sans-serif" font-size="18" fill="#475569">Dataset: 12 delegated-agent tasks across repository, tool, data, cloud, and runtime surfaces.</text>
  <g>
    <text x="74" y="74" font-family="Arial, sans-serif" font-size="22" fill="#0f172a">openDelegation</text>
    <rect x="74" y="92" width="180" height="28" rx="6" fill="#64748b" />
    <text x="272" y="113" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">pass 83%, risk cost 28</text>
  </g>
<g>
    <text x="74" y="162" font-family="Arial, sans-serif" font-size="22" fill="#0f172a">approvalOnly</text>
    <rect x="74" y="180" width="60" height="28" rx="6" fill="#64748b" />
    <text x="152" y="201" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">pass 75%, risk cost 42</text>
  </g>
<g>
    <text x="74" y="250" font-family="Arial, sans-serif" font-size="22" fill="#0f172a">capabilityGate</text>
    <rect x="74" y="268" width="403" height="28" rx="6" fill="#0f766e" />
    <text x="495" y="289" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">pass 92%, risk cost 2</text>
  </g>
</svg>
