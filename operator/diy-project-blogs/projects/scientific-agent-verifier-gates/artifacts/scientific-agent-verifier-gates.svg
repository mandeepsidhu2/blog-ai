<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Scientific agent verifier gate results</title>
  <desc id="desc">Bar chart comparing narrative confidence, metric-only, and verifier-first policies by pass rate, unsupported claims, leakage risks, and missed expert reviews.</desc>
  <rect width="960" height="540" fill="#f7f3ea" />
  <rect x="28" y="28" width="904" height="484" rx="8" fill="#ffffff" stroke="#d4c7b4" />
  <text x="48" y="70" class="title">Scientific Agent Verifier Gates</text>
  <text x="48" y="96" class="subtitle">Pass rate is normalized; issue bars show raw counts across 16 cases.</text>
  
      <text x="48" y="131" class="label">narrativeConfidence</text>
      <rect x="210" y="116" width="105" height="18" rx="4" fill="#1b998b" />
      <text x="327" y="130" class="value">0.250 pass</text>
      <rect x="210" y="144" width="420" height="18" rx="4" fill="#d95d39" />
      <text x="642" y="158" class="value">9 unsupported</text>
      <rect x="210" y="172" width="233" height="18" rx="4" fill="#4464ad" />
      <text x="455" y="186" class="value">5 leakage</text>
      <rect x="210" y="200" width="327" height="18" rx="4" fill="#7d5fff" />
      <text x="549" y="214" class="value">7 review misses</text>
      <text x="48" y="249" class="label">metricOnly</text>
      <rect x="210" y="234" width="158" height="18" rx="4" fill="#1b998b" />
      <text x="380" y="248" class="value">0.375 pass</text>
      <rect x="210" y="262" width="280" height="18" rx="4" fill="#d95d39" />
      <text x="502" y="276" class="value">6 unsupported</text>
      <rect x="210" y="290" width="140" height="18" rx="4" fill="#4464ad" />
      <text x="362" y="304" class="value">3 leakage</text>
      <rect x="210" y="318" width="327" height="18" rx="4" fill="#7d5fff" />
      <text x="549" y="332" class="value">7 review misses</text>
      <text x="48" y="367" class="label">verifierFirstGate</text>
      <rect x="210" y="352" width="420" height="18" rx="4" fill="#1b998b" />
      <text x="642" y="366" class="value">1.000 pass</text>
      <rect x="210" y="380" width="0" height="18" rx="4" fill="#d95d39" />
      <text x="222" y="394" class="value">0 unsupported</text>
      <rect x="210" y="408" width="0" height="18" rx="4" fill="#4464ad" />
      <text x="222" y="422" class="value">0 leakage</text>
      <rect x="210" y="436" width="0" height="18" rx="4" fill="#7d5fff" />
      <text x="222" y="450" class="value">0 review misses</text>
  <g transform="translate(48 480)">
    <rect width="16" height="16" fill="#1b998b" /><text x="24" y="13" class="legend">Pass rate</text>
    <rect x="124" width="16" height="16" fill="#d95d39" /><text x="148" y="13" class="legend">Unsupported claims</text>
    <rect x="308" width="16" height="16" fill="#4464ad" /><text x="332" y="13" class="legend">Leakage risks</text>
    <rect x="448" width="16" height="16" fill="#7d5fff" /><text x="472" y="13" class="legend">Review misses</text>
  </g>
  <style>
    .title { font: 700 28px Arial, sans-serif; fill: #1f2933; }
    .subtitle { font: 15px Arial, sans-serif; fill: #5d6875; }
    .label { font: 700 17px Arial, sans-serif; fill: #1f2933; }
    .value { font: 13px Arial, sans-serif; fill: #293845; }
    .legend { font: 13px Arial, sans-serif; fill: #46515e; }
  </style>
</svg>
