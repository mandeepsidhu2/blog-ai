<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" data-text-fit="bounded" data-visual-quality="publication" data-visual-system="fieldbook-v2">
  <title>Claude Sonnet 5 effort and token budget decision surface</title>
  <desc>A decision chart separates fixed-effort capability evidence, tokenizer expansion, introductory pricing, and steady-state canary economics.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="1200" height="675" fill="#080c12"/>
    <rect width="1200" height="675" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <text x="64" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28" font-weight="700" fill="#0f172a">A Sonnet 5 canary has four moving denominators</text>
  <text x="64" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#475569">Freeze effort, replay exact text, price twice, verify the task</text>
  <line x1="64" y1="122" x2="1136" y2="122" stroke="#40515f" stroke-width="2"/>

  <rect x="64" y="158" width="250" height="190" rx="8" fill="#102938" stroke="#52dcef" stroke-width="2"/>
  <text x="84" y="192" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#1e3a8a">1 · EFFORT</text>
  <text x="84" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#1e3a8a">Terminal-Bench 2.1</text>
  <text x="84" y="254" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700" fill="#0f172a">80.4% vs 67.0%</text>
  <text x="84" y="282" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">Sonnet 5 xhigh</text>
  <text x="84" y="304" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">Sonnet 4.6 high</text>
  <text x="84" y="332" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">Not a model-only contrast</text>

  <rect x="338" y="158" width="250" height="190" rx="8" fill="#ccfbf1" stroke="#43d6a0" stroke-width="2"/>
  <text x="358" y="192" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#115e59">2 · TOKENIZER</text>
  <text x="358" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#115e59">Same text may map to</text>
  <text x="358" y="264" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="30" font-weight="700" fill="#0f172a">1.0–1.35×</text>
  <text x="358" y="294" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">the previous token count</text>
  <text x="358" y="332" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">Replay, do not estimate</text>

  <rect x="612" y="158" width="250" height="190" rx="8" fill="#302418" stroke="#ffb84d" stroke-width="2"/>
  <text x="632" y="192" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#92400e">3 · PRICE PHASE</text>
  <text x="632" y="230" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#92400e">through Aug. 31</text>
  <text x="632" y="260" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700" fill="#0f172a">$2 / $10</text>
  <text x="632" y="290" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#92400e">steady state</text>
  <text x="632" y="320" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700" fill="#0f172a">$3 / $15</text>
  <text x="632" y="340" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#64748b">USD per MTok input / output</text>

  <rect x="886" y="158" width="250" height="190" rx="8" fill="#ffe4e6" stroke="#be123c" stroke-width="2"/>
  <text x="906" y="192" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#9f1239">4 · VERIFIER</text>
  <text x="906" y="230" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#9f1239">Task completion ≠</text>
  <text x="906" y="264" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="23" font-weight="700" fill="#0f172a">accepted outcome</text>
  <text x="906" y="296" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">tests · citations · policy</text>
  <text x="906" y="332" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">Cost per verified success</text>

  <path d="M189 372 L189 410 L1011 410 L1011 372" fill="none" stroke="#64748b" stroke-width="3"/>
  <path d="M600 410 L600 448" fill="none" stroke="#64748b" stroke-width="3"/>
  <polygon points="600,458 592,444 608,444" fill="#64748b"/>
  <rect x="270" y="468" width="660" height="132" rx="8" fill="#0f172a"/>
  <text x="600" y="506" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700" fill="#101720">PROMOTE ONLY THE FIXED-BUDGET CELL</text>
  <text x="600" y="540" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334250">equal effort · equal ceilings · exact tokenizer replay</text>
  <text x="600" y="568" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334250">intro + steady-state price · randomized incumbent</text>
  <text x="600" y="642" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">Sources: Anthropic release + Sonnet 5 System Card, 2026-06-30</text>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 13px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
    <circle cx="28" cy="26" r="4" fill="#b8f56a"/>
    <circle cx="42" cy="26" r="4" fill="#52dcef"/>
    <text class="fieldbook-kicker" x="1176" y="30" text-anchor="end">AI SYSTEMS FIELDBOOK / SYSTEM ARCHITECTURE</text>
    <rect x="0.5" y="0.5" width="1199" height="674" rx="8" fill="none" stroke="#2b3742" stroke-width="1"/>
  </g>
</svg>
