<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" data-visual-quality="publication" data-text-fit="bounded" role="img" aria-labelledby="title desc" data-visual-system="fieldbook-v2">
<title id="title">Migration surface for MCP specification 2026-07-28</title>
<desc id="desc">A before-and-after architecture and change matrix for the stateless MCP core, explicit application state handles, Tasks and Apps extensions, authorization hardening, and conformance gates.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="1280" height="720" fill="#080c12"/>
    <rect width="1280" height="720" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07101f"/><stop offset="1" stop-color="#10213b"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#8fb7ff"/></marker></defs>

<style>
text{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#e5eefc}.eyebrow{font-size:15px;letter-spacing:2px;fill:#8fb7ff}.title{font-family:ui-sans-serif,system-ui,sans-serif;font-size:31px;font-weight:700}.subtitle{font-size:14px;fill:#a9bad3}.panel{fill:#111b32;stroke:#2b3b5c}.panel-title{font-size:17px;font-weight:700}.label{font-size:13px;fill:#c8d5e8}.small{font-size:11px;fill:#9fb0c9}.old{fill:#ff8a65}.new{fill:#5eead4}.warn{fill:#f6c453}
</style>
<text x="56" y="45" class="eyebrow">LOCKED RELEASE CANDIDATE • FINAL SPECIFICATION JULY 28, 2026</text>
<text x="56" y="83" class="title" textLength="1196" lengthAdjust="spacingAndGlyphs">Stateless MCP moves complexity from transport into explicit contracts</text>
<text x="56" y="108" class="subtitle">Dual-stack the versions until state, authorization, retries, extensions, and conformance pass.</text>

<rect x="42" y="145" width="570" height="246" rx="8" class="panel"/>
<text x="66" y="179" class="panel-title">2025-11-25: protocol session carries hidden state</text>
<rect x="72" y="223" width="120" height="54" rx="8" fill="#1b2a49" stroke="#ff8a65"/><text x="132" y="246" text-anchor="middle" class="label">Client</text><text x="132" y="264" text-anchor="middle" class="small">initialize</text>
<rect x="258" y="213" width="140" height="74" rx="8" fill="#1b2a49" stroke="#ff8a65"/><text x="328" y="241" text-anchor="middle" class="label">Sticky route</text><text x="328" y="260" text-anchor="middle" class="small">Mcp-Session-Id</text>
<rect x="464" y="223" width="120" height="54" rx="8" fill="#1b2a49" stroke="#ff8a65"/><text x="524" y="246" text-anchor="middle" class="label">Server A</text><text x="524" y="264" text-anchor="middle" class="small">session owner</text>
<line x1="192" y1="250" x2="252" y2="250" stroke="#ff8a65" stroke-width="3" marker-end="url(#arrow)"/><line x1="398" y1="250" x2="458" y2="250" stroke="#ff8a65" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="258" y="314" width="140" height="48" rx="8" fill="#281d2c" stroke="#ff8a65"/><text x="328" y="343" text-anchor="middle" class="label">Session store</text><line x1="328" y1="287" x2="328" y2="308" stroke="#ff8a65" stroke-width="3"/>

<rect x="642" y="145" width="596" height="246" rx="8" class="panel"/>
<text x="666" y="179" class="panel-title">2026-07-28: any instance handles a self-contained request</text>
<rect x="672" y="218" width="126" height="64" rx="8" fill="#1b2a49" stroke="#5eead4"/><text x="735" y="242" text-anchor="middle" class="label">Client</text><text x="735" y="261" text-anchor="middle" class="small">version + _meta</text>
<rect x="842" y="208" width="146" height="84" rx="8" fill="#1b2a49" stroke="#5eead4"/><text x="915" y="237" text-anchor="middle" class="label">Round robin</text><text x="915" y="256" text-anchor="middle" class="small">Mcp-Method</text><text x="915" y="273" text-anchor="middle" class="small">Mcp-Name</text>
<rect x="1032" y="199" width="176" height="42" rx="8" fill="#1b2a49" stroke="#5eead4"/><text x="1120" y="225" text-anchor="middle" class="label">Server A / B / C</text>
<rect x="1032" y="258" width="176" height="78" rx="8" fill="#18283b" stroke="#f6c453"/><text x="1120" y="284" text-anchor="middle" class="label">Application state</text><text x="1120" y="303" text-anchor="middle" class="small">scoped opaque handle</text><text x="1120" y="320" text-anchor="middle" class="small">idempotency + authority</text>
<line x1="798" y1="250" x2="836" y2="250" stroke="#5eead4" stroke-width="3" marker-end="url(#arrow)"/><line x1="988" y1="250" x2="1026" y2="220" stroke="#5eead4" stroke-width="3" marker-end="url(#arrow)"/><line x1="1120" y1="241" x2="1120" y2="252" stroke="#f6c453" stroke-width="3"/>

<rect x="42" y="421" width="1196" height="222" rx="8" class="panel"/>
<text x="66" y="455" class="panel-title">Migration gates</text>
<line x1="278" y1="475" x2="278" y2="620" stroke="#344464"/><line x1="518" y1="475" x2="518" y2="620" stroke="#344464"/><line x1="758" y1="475" x2="758" y2="620" stroke="#344464"/><line x1="998" y1="475" x2="998" y2="620" stroke="#344464"/>
<circle cx="84" cy="500" r="7" class="new"/><text x="104" y="505" class="label">State handles</text><text x="66" y="535" class="small">tenant-bound</text><text x="66" y="553" class="small">revocable</text><text x="66" y="571" class="small">replay-safe</text><text x="66" y="589" class="small">expiry-tested</text>
<circle cx="324" cy="500" r="7" class="new"/><text x="344" y="505" class="label">Tasks extension</text><text x="306" y="535" class="small">get / update / cancel</text><text x="306" y="553" class="small">no tasks/list</text><text x="306" y="571" class="small">worker cancellation</text><text x="306" y="589" class="small">final outcome audit</text>
<circle cx="564" cy="500" r="7" class="new"/><text x="584" y="505" class="label">Authorization</text><text x="546" y="535" class="small">iss validation</text><text x="546" y="553" class="small">client type</text><text x="546" y="571" class="small">issuer binding</text><text x="546" y="589" class="small">resource audience</text>
<circle cx="804" cy="500" r="7" class="warn"/><text x="824" y="505" class="label">Schema + Apps</text><text x="786" y="535" class="small">bounded validation</text><text x="786" y="553" class="small">no external $ref</text><text x="786" y="571" class="small">sandboxed iframe</text><text x="786" y="589" class="small">UI consent path</text>
<circle cx="1044" cy="500" r="7" class="new"/><text x="1064" y="505" class="label">Conformance</text><text x="1026" y="535" class="small">header/body match</text><text x="1026" y="553" class="small">cross-instance retry</text><text x="1026" y="571" class="small">trace propagation</text><text x="1026" y="589" class="small">old/new parity</text>
<text x="56" y="687" class="small">Source: MCP 2026-07-28 release candidate, locked May 21, 2026. Breaking changes require application-level validation.</text>
