<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Agent trace gate measurement results</title>
  <desc id="desc">Bar chart comparing final-summary, command-log, and trace-contract release gates by accuracy and false negatives on sixteen labeled agent traces.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="86" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Trace-contract gates catch release-blocking agent actions</text>
  <text x="86" y="115" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Sixteen labeled traces; lower false negatives are better.</text>
  <line x1="112" y1="540" x2="1088" y2="540" stroke="#94a3b8" stroke-width="2"/>
  <line x1="112" y1="160" x2="112" y2="540" stroke="#94a3b8" stroke-width="2"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="56" y="166" font-size="15" fill="#475569">1.0</text>
    <text x="56" y="545" font-size="15" fill="#475569">0.0</text>
    <rect x="205" y="468" width="56" height="72" rx="7" fill="#2563eb"/>
    <rect x="275" y="540" width="56" height="0" rx="7" fill="#16a34a"/>
    <rect x="345" y="303" width="56" height="237" rx="7" fill="#dc2626"/>
    <text x="303" y="585" text-anchor="middle" font-size="17" fill="#0f172a">Final summary</text>
    <rect x="522" y="398" width="56" height="142" rx="7" fill="#2563eb"/>
    <rect x="592" y="477" width="56" height="63" rx="7" fill="#16a34a"/>
    <rect x="662" y="341" width="56" height="199" rx="7" fill="#dc2626"/>
    <text x="620" y="585" text-anchor="middle" font-size="17" fill="#0f172a">Command log</text>
    <rect x="839" y="184" width="56" height="356" rx="7" fill="#2563eb"/>
    <rect x="909" y="160" width="56" height="380" rx="7" fill="#16a34a"/>
    <rect x="979" y="540" width="56" height="0" rx="7" fill="#dc2626"/>
    <text x="937" y="585" text-anchor="middle" font-size="17" fill="#0f172a">Trace contract</text>
    <rect x="720" y="92" width="18" height="18" rx="4" fill="#2563eb"/>
    <text x="746" y="107" font-size="15" fill="#334155">accuracy</text>
    <rect x="828" y="92" width="18" height="18" rx="4" fill="#16a34a"/>
    <text x="854" y="107" font-size="15" fill="#334155">block recall</text>
    <rect x="963" y="92" width="18" height="18" rx="4" fill="#dc2626"/>
    <text x="989" y="107" font-size="15" fill="#334155">false-negative rate</text>
    <text x="205" y="455" font-size="14" fill="#1e3a8a">0.188</text>
    <text x="522" y="385" font-size="14" fill="#1e3a8a">0.375</text>
    <text x="839" y="171" font-size="14" fill="#1e3a8a">0.938</text>
    <text x="345" y="289" font-size="14" fill="#7f1d1d">6 missed</text>
    <text x="662" y="327" font-size="14" fill="#7f1d1d">5 missed</text>
    <text x="979" y="526" font-size="14" fill="#7f1d1d">0 missed</text>
  </g>
</svg>
