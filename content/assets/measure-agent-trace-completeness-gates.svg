<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title id="title">Agent trace gate measurement results</title>
  <desc id="desc">Bar chart comparing final-summary, command-log, and trace-contract release gates by accuracy and false negatives on sixteen labeled agent traces.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="1200" height="675" fill="#080c12"/>
    <rect width="1200" height="675" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <text x="86" y="78" font-family="Inter, Inter, system-ui, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Trace-contract gates catch release-blocking agent actions</text>
  <text x="86" y="115" font-family="Inter, Inter, system-ui, sans-serif" font-size="18" fill="#475569">Sixteen labeled traces; lower false negatives are better.</text>
  <line x1="112" y1="540" x2="1088" y2="540" stroke="#40515f" stroke-width="2"/>
  <line x1="112" y1="160" x2="112" y2="540" stroke="#40515f" stroke-width="2"/>
  <g font-family="Inter, Inter, system-ui, sans-serif">
    <text x="56" y="166" font-size="15" fill="#475569">1.0</text>
    <text x="56" y="545" font-size="15" fill="#475569">0.0</text>
    <rect x="205" y="468" width="56" height="72" rx="7" fill="#52dcef"/>
    <rect x="275" y="540" width="56" height="0" rx="7" fill="#b8f56a"/>
    <rect x="345" y="303" width="56" height="237" rx="7" fill="#ff657a"/>
    <text x="303" y="585" text-anchor="middle" font-size="17" fill="#0f172a">Final summary</text>
    <rect x="522" y="398" width="56" height="142" rx="7" fill="#52dcef"/>
    <rect x="592" y="477" width="56" height="63" rx="7" fill="#b8f56a"/>
    <rect x="662" y="341" width="56" height="199" rx="7" fill="#ff657a"/>
    <text x="620" y="585" text-anchor="middle" font-size="17" fill="#0f172a">Command log</text>
    <rect x="839" y="184" width="56" height="356" rx="7" fill="#52dcef"/>
    <rect x="909" y="160" width="56" height="380" rx="7" fill="#b8f56a"/>
    <rect x="979" y="540" width="56" height="0" rx="7" fill="#ff657a"/>
    <text x="937" y="585" text-anchor="middle" font-size="17" fill="#0f172a">Trace contract</text>
    <rect x="720" y="92" width="18" height="18" rx="4" fill="#52dcef"/>
    <text x="746" y="107" font-size="15" fill="#334155">accuracy</text>
    <rect x="828" y="92" width="18" height="18" rx="4" fill="#b8f56a"/>
    <text x="854" y="107" font-size="15" fill="#334155">block recall</text>
    <rect x="963" y="92" width="18" height="18" rx="4" fill="#ff657a"/>
    <text x="989" y="107" font-size="15" fill="#334155">false-negative rate</text>
    <text x="205" y="455" font-size="14" fill="#1e3a8a">0.188</text>
    <text x="522" y="385" font-size="14" fill="#1e3a8a">0.375</text>
    <text x="839" y="171" font-size="14" fill="#1e3a8a">0.938</text>
    <text x="345" y="289" font-size="14" fill="#7f1d1d">6 missed</text>
    <text x="662" y="327" font-size="14" fill="#7f1d1d">5 missed</text>
    <text x="979" y="526" font-size="14" fill="#7f1d1d">0 missed</text>
  </g>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 13px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
    <circle cx="28" cy="26" r="4" fill="#b8f56a"/>
    <circle cx="42" cy="26" r="4" fill="#52dcef"/>
    <text class="fieldbook-kicker" x="1176" y="30" text-anchor="end">AI SYSTEMS FIELDBOOK / MEASURED RESULTS</text>
    <rect x="0.5" y="0.5" width="1199" height="674" rx="8" fill="none" stroke="#2b3742" stroke-width="1"/>
  </g>
</svg>
