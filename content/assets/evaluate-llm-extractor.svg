<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LLM extractor evaluation harness</title>
  <desc id="desc">Diagram showing test cases passing through an extractor, JSON validation, schema checks, and field-level metrics.</desc>
  <rect width="1600" height="900" fill="#f8f4ea"/>
  <rect x="86" y="80" width="1428" height="740" rx="26" fill="#11241f"/>
  <text x="144" y="158" fill="#f5d46c" font-family="Arial, sans-serif" font-size="54" font-weight="800">LLM JSON Extractor Evaluation</text>
  <g fill="#fbf7eb" stroke="#86c6aa" stroke-width="5">
    <rect x="145" y="300" width="270" height="190" rx="14"/>
    <rect x="500" y="300" width="270" height="190" rx="14"/>
    <rect x="855" y="300" width="270" height="190" rx="14"/>
    <rect x="1210" y="300" width="270" height="190" rx="14"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#10241f" text-anchor="middle">
    <text x="280" y="382" font-size="32" font-weight="800">Test cases</text>
    <text x="635" y="382" font-size="32" font-weight="800">Extractor</text>
    <text x="990" y="382" font-size="32" font-weight="800">Schema</text>
    <text x="1345" y="382" font-size="32" font-weight="800">Metrics</text>
    <text x="280" y="424" font-size="22">positives + negatives</text>
    <text x="635" y="424" font-size="22">raw JSON text</text>
    <text x="990" y="424" font-size="22">validity checks</text>
    <text x="1345" y="424" font-size="22">field accuracy</text>
  </g>
  <g stroke="#f5d46c" stroke-width="8" stroke-linecap="round">
    <path d="M420 395h70"/>
    <path d="M775 395h70"/>
    <path d="M1130 395h70"/>
  </g>
  <text x="150" y="650" fill="#d7e7dc" font-family="Arial, sans-serif" font-size="28">Production gate: block model or prompt changes when schema validity, exact match, or field accuracy regresses.</text>
</svg>
