<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="title desc">
  <title id="title">Multimodal retrieval gate architecture</title>
  <desc id="desc">Architecture diagram showing mixed media ingestion routed through modality adapters, embedding indexes, policy gates, reranking, citation checks, and production monitoring.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="54" y="58" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#172033">Multimodal Retrieval Gates</text>
  <text x="54" y="92" font-family="Arial, sans-serif" font-size="17" fill="#475569">Keep mixed text, image, table, audio, and video evidence useful without hiding modality risk.</text>

  <g font-family="Arial, sans-serif">
    <rect x="54" y="142" width="154" height="236" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
    <text x="131" y="176" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Ingestion</text>
    <text x="82" y="218" font-size="16" fill="#334155">Text docs</text>
    <text x="82" y="252" font-size="16" fill="#334155">Screenshots</text>
    <text x="82" y="286" font-size="16" fill="#334155">Tables</text>
    <text x="82" y="320" font-size="16" fill="#334155">Audio/video</text>
    <text x="82" y="354" font-size="16" fill="#334155">Code snippets</text>

    <rect x="262" y="124" width="174" height="272" rx="8" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
    <text x="349" y="158" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Adapters</text>
    <text x="292" y="202" font-size="16" fill="#334155">OCR and captions</text>
    <text x="292" y="236" font-size="16" fill="#334155">Table schemas</text>
    <text x="292" y="270" font-size="16" fill="#334155">Video segments</text>
    <text x="292" y="304" font-size="16" fill="#334155">Task prefixes</text>
    <text x="292" y="338" font-size="16" fill="#334155">Sensitivity tags</text>

    <rect x="498" y="124" width="180" height="272" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
    <text x="588" y="158" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Retrieval Gate</text>
    <text x="528" y="202" font-size="16" fill="#334155">Modality route</text>
    <text x="528" y="236" font-size="16" fill="#334155">Domain filter</text>
    <text x="528" y="270" font-size="16" fill="#334155">Privacy budget</text>
    <text x="528" y="304" font-size="16" fill="#334155">Top-k by class</text>
    <text x="528" y="338" font-size="16" fill="#334155">Rerank evidence</text>

    <rect x="734" y="142" width="172" height="236" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
    <text x="820" y="176" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Answer Gate</text>
    <text x="766" y="218" font-size="16" fill="#334155">Citation check</text>
    <text x="766" y="252" font-size="16" fill="#334155">Unsupported stop</text>
    <text x="766" y="286" font-size="16" fill="#334155">Trace metrics</text>
    <text x="766" y="320" font-size="16" fill="#334155">Rollback rule</text>
    <text x="766" y="354" font-size="16" fill="#334155">Human review</text>
  </g>

  <g stroke="#334155" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M208 260 H262"/>
    <path d="M436 260 H498"/>
    <path d="M678 260 H734"/>
  </g>
  <g fill="#334155">
    <path d="M254 252 L267 260 L254 268 Z"/>
    <path d="M490 252 L503 260 L490 268 Z"/>
    <path d="M726 252 L739 260 L726 268 Z"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="15" fill="#475569">
    <rect x="90" y="426" width="780" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="114" y="459">Release metrics: recall@k, modality precision, sensitivity violations, citation validity, latency, and rollback triggers.</text>
  </g>
</svg>
