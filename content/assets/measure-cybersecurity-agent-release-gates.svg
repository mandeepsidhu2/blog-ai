<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title>Cybersecurity agent release gate policy comparison</title>
  <desc>Bar chart comparing severity-only, exploit-proof-only, and dual-use gate policies by accuracy, mean score, and false negatives.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="960" height="540" fill="#080c12"/>
    <rect width="960" height="540" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <rect x="36" y="32" width="888" height="476" rx="8" fill="#121a23" stroke="#334250"/>
  <text x="70" y="78" font-size="30" font-weight="800" fill="#111827">Cybersecurity Agent Gate Harness</text>
  <text x="70" y="108" font-size="16" fill="#475569">Accuracy and mean score are higher-is-better; false negatives are release-stopping misses.</text>
  <text x="300" y="128" font-size="14" font-weight="700" fill="#43d6a0">accuracy</text>
  <text x="390" y="128" font-size="14" font-weight="700" fill="#52dcef">mean score</text>
  <text x="500" y="128" font-size="14" font-weight="700" fill="#b45309">false negatives / 8</text>

        <text x="70" y="149" font-size="20" font-weight="700" fill="#111827">severityOnly</text>
        <rect x="300" y="131" width="129" height="18" rx="3" fill="#43d6a0"/>
        <rect x="300" y="161" width="220" height="18" rx="3" fill="#52dcef"/>
        <rect x="300" y="191" width="113" height="18" rx="3" fill="#b45309"/>
        <text x="444" y="147" font-size="16" fill="#111827">0.429</text>
        <text x="535" y="177" font-size="16" fill="#111827">0.732</text>
        <text x="428" y="207" font-size="16" fill="#111827">3 FN</text>

        <text x="70" y="254" font-size="20" font-weight="700" fill="#111827">exploitProofOnly</text>
        <rect x="300" y="236" width="129" height="18" rx="3" fill="#43d6a0"/>
        <rect x="300" y="266" width="204" height="18" rx="3" fill="#52dcef"/>
        <rect x="300" y="296" width="150" height="18" rx="3" fill="#b45309"/>
        <text x="444" y="252" font-size="16" fill="#111827">0.429</text>
        <text x="519" y="282" font-size="16" fill="#111827">0.679</text>
        <text x="465" y="312" font-size="16" fill="#111827">4 FN</text>

        <text x="70" y="359" font-size="20" font-weight="700" fill="#111827">dualUseGate</text>
        <rect x="300" y="341" width="300" height="18" rx="3" fill="#43d6a0"/>
        <rect x="300" y="371" width="300" height="18" rx="3" fill="#52dcef"/>
        <rect x="300" y="401" width="0" height="18" rx="3" fill="#b45309"/>
        <text x="615" y="357" font-size="16" fill="#111827">1</text>
        <text x="615" y="387" font-size="16" fill="#111827">1</text>
        <text x="315" y="417" font-size="16" fill="#111827">0 FN</text>

  <line x1="300" y1="440" x2="600" y2="440" stroke="#40515f"/>
  <text x="300" y="468" font-size="13" fill="#64748b">0.0</text>
  <text x="585" y="468" font-size="13" fill="#64748b">1.0</text>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 11px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
    <line x1="24" y1="116" x2="936" y2="116" stroke="#2a3641" stroke-width="1"/>
    <circle cx="28" cy="26" r="4" fill="#b8f56a"/>
    <circle cx="42" cy="26" r="4" fill="#52dcef"/>
    <text class="fieldbook-kicker" x="936" y="30" text-anchor="end">AI SYSTEMS FIELDBOOK / MEASURED RESULTS</text>
    <rect x="0.5" y="0.5" width="959" height="539" rx="8" fill="none" stroke="#2b3742" stroke-width="1"/>
  </g>
</svg>
