<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title id="title">Token budget routing policy comparison</title>
  <desc id="desc">Bar chart comparing pass rate, normalized cost, and combined SLA or quality misses for frontier-only, cheapest-first, and budget-gate routing policies.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="920" height="520" fill="#080c12"/>
    <rect width="920" height="520" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <rect x="38" y="34" width="844" height="448" rx="8" fill="#121a23" stroke="#334250"/>
  <text x="70" y="70" font-size="24" font-weight="700" fill="#111827">Token-budget routing scorecard</text>
  <text x="70" y="99" font-size="15" fill="#475569">Higher pass bars are better; cost is normalized to the most expensive policy; misses should be zero.</text>
  <line x1="70" y1="388" x2="835" y2="388" stroke="#40515f"/>
  <line x1="70" y1="78" x2="70" y2="388" stroke="#40515f"/>
  <text x="42" y="86" font-size="13" fill="#64748b">1.0</text>
  <text x="42" y="392" font-size="13" fill="#64748b">0</text>

        <g>
          <rect x="90" y="155.5" width="48" height="232.5" rx="4" fill="#43d6a0"/>
          <rect x="154" y="78" width="48" height="310" rx="4" fill="#9b87ff"/>
          <rect x="218" y="316" width="48" height="72" rx="4" fill="#ff657a"/>
          <text x="114" y="416" text-anchor="middle" font-size="15" fill="#172033">pass</text>
          <text x="178" y="416" text-anchor="middle" font-size="15" fill="#172033">cost</text>
          <text x="242" y="416" text-anchor="middle" font-size="15" fill="#172033">miss</text>
          <text x="178" y="446" text-anchor="middle" font-size="18" font-weight="700" fill="#172033">frontierOnly</text>
        </g>
        <g>
          <rect x="330" y="207.27" width="48" height="180.73" rx="4" fill="#b45309"/>
          <rect x="394" y="327.51494671172344" width="48" height="60.48505328827658" rx="4" fill="#9b87ff"/>
          <rect x="458" y="268" width="48" height="120" rx="4" fill="#ff657a"/>
          <text x="354" y="416" text-anchor="middle" font-size="15" fill="#172033">pass</text>
          <text x="418" y="416" text-anchor="middle" font-size="15" fill="#172033">cost</text>
          <text x="482" y="416" text-anchor="middle" font-size="15" fill="#172033">miss</text>
          <text x="418" y="446" text-anchor="middle" font-size="18" font-weight="700" fill="#172033">cheapestFirst</text>
        </g>
        <g>
          <rect x="570" y="129.77000000000004" width="48" height="258.22999999999996" rx="4" fill="#52dcef"/>
          <rect x="634" y="181.01637639719263" width="48" height="206.98362360280737" rx="4" fill="#9b87ff"/>
          <rect x="698" y="340" width="48" height="48" rx="4" fill="#ff657a"/>
          <text x="594" y="416" text-anchor="middle" font-size="15" fill="#172033">pass</text>
          <text x="658" y="416" text-anchor="middle" font-size="15" fill="#172033">cost</text>
          <text x="722" y="416" text-anchor="middle" font-size="15" fill="#172033">miss</text>
          <text x="658" y="446" text-anchor="middle" font-size="18" font-weight="700" fill="#172033">budgetGate</text>
        </g>
  <g transform="translate(70 455)">
    <rect width="14" height="14" fill="#52dcef"/><text x="22" y="12" font-size="14" fill="#334155">Pass rate</text>
    <rect x="128" width="14" height="14" fill="#9b87ff"/><text x="150" y="12" font-size="14" fill="#334155">Normalized total cost</text>
    <rect x="320" width="14" height="14" fill="#ff657a"/><text x="342" y="12" font-size="14" fill="#334155">SLA or quality misses</text>
  </g>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 11px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
