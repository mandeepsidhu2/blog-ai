      <text x="806" y="515" text-anchor="middle" class="axis">4 / 0 ms</text>
<rect x="877" y="413.8803820377299" width="68" height="68.11961796227013" rx="6" fill="#5bc0be"/>
      <text x="911" y="401.8803820377299" text-anchor="middle" class="value">21.7 ms</text>
