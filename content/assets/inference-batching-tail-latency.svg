<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
<title>The same batching delay has opposite tail-latency effects</title>
<desc>Two-panel bar chart comparing p95 latency for four batch policies under Poisson and synchronized burst traffic at 90 requests per second.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="1200" height="675" fill="#080c12"/>
    <rect width="1200" height="675" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

<text x="64" y="62" class="title">Arrival shape flips the batching decision</text>
<text x="64" y="94" class="sub">p95 response latency · 90 requests/s · 60 independent traces · lower is better</text>
<rect x="60" y="125" width="525" height="455" rx="8" fill="#111b2d" stroke="#2a3954"/>
<rect x="615" y="125" width="525" height="455" rx="8" fill="#111b2d" stroke="#2a3954"/>
<text x="86" y="162" class="panel">Poisson arrivals</text>
<text x="641" y="162" class="panel">16-request synchronized bursts</text>
<line x1="86" y1="482" x2="559" y2="482" stroke="#263650"/><line x1="641" y1="482" x2="1114" y2="482" stroke="#263650"/><text x="78" y="487" text-anchor="end" class="axis">0</text><line x1="86" y1="403.42857142857144" x2="559" y2="403.42857142857144" stroke="#263650"/><line x1="641" y1="403.42857142857144" x2="1114" y2="403.42857142857144" stroke="#263650"/><text x="78" y="408.42857142857144" text-anchor="end" class="axis">25</text><line x1="86" y1="324.8571428571429" x2="559" y2="324.8571428571429" stroke="#263650"/><line x1="641" y1="324.8571428571429" x2="1114" y2="324.8571428571429" stroke="#263650"/><text x="78" y="329.8571428571429" text-anchor="end" class="axis">50</text><line x1="86" y1="246.28571428571428" x2="559" y2="246.28571428571428" stroke="#263650"/><line x1="641" y1="246.28571428571428" x2="1114" y2="246.28571428571428" stroke="#263650"/><text x="78" y="251.28571428571428" text-anchor="end" class="axis">75</text><line x1="86" y1="167.71428571428572" x2="559" y2="167.71428571428572" stroke="#263650"/><line x1="641" y1="167.71428571428572" x2="1114" y2="167.71428571428572" stroke="#263650"/><text x="78" y="172.71428571428572" text-anchor="end" class="axis">100</text>
<line x1="86" y1="403.42857142857144" x2="559" y2="403.42857142857144" stroke="#f7d154" stroke-width="2" stroke-dasharray="7 6"/>
<line x1="641" y1="403.42857142857144" x2="1114" y2="403.42857142857144" stroke="#f7d154" stroke-width="2" stroke-dasharray="7 6"/>
<text x="1078" y="394.42857142857144" text-anchor="end" class="slo">25 ms SLO</text>
<rect x="112" y="408.65690448022065" width="68" height="73.34309551977935" rx="6" fill="#ef6f6c"/>
      <text x="146" y="396.65690448022065" text-anchor="middle" class="value">23.3 ms</text>
      <text x="146" y="515" text-anchor="middle" class="axis">single</text>
<rect x="217" y="442.44670924593663" width="68" height="39.55329075406337" rx="6" fill="#f4b860"/>
