<rect x="322" y="442.4887845923283" width="68" height="39.51121540767173" rx="6" fill="#5bc0be"/>
      <text x="356" y="430.4887845923283" text-anchor="middle" class="value">12.6 ms</text>
      <text x="356" y="515" text-anchor="middle" class="axis">8 / 2 ms</text>
<rect x="427" y="427.04700923770406" width="68" height="54.95299076229594" rx="6" fill="#5b8def"/>
