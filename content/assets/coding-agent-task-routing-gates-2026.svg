<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title id="title">Coding-agent rollout gate architecture</title>
  <desc id="desc">Architecture diagram showing source signals, task intake, routing gates, review controls, budget observability, and rollback criteria for coding-agent adoption.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="960" height="540" fill="#080c12"/>
    <rect width="960" height="540" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <text x="46" y="54" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#17202a">Coding-agent task routing gates</text>
  <text x="46" y="84" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" fill="#52606d">Treat delegated coding as a routed production workflow, not a blanket license expansion.</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="50" y="128" width="190" height="250" rx="6" fill="#121a23" stroke="#334250"/>
    <text x="72" y="162" font-size="17" font-weight="700" fill="#17202a">Current signals</text>
    <text x="72" y="198" font-size="14" fill="#334155">Provider docs</text>
    <text x="72" y="228" font-size="14" fill="#334155">Adoption studies</text>
    <text x="72" y="258" font-size="14" fill="#334155">PR outcome research</text>
    <text x="72" y="288" font-size="14" fill="#334155">Usage-limit reports</text>
    <text x="72" y="318" font-size="14" fill="#334155">Community discovery</text>
    <path d="M240 252H315" stroke="#78909c" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="315" y="118" width="210" height="270" rx="6" fill="#121a23" stroke="#334250"/>
    <text x="338" y="154" font-size="17" font-weight="700" fill="#17202a">Task intake</text>
    <text x="338" y="190" font-size="14" fill="#334155">Risk and owner</text>
    <text x="338" y="220" font-size="14" fill="#334155">CI and test surface</text>
    <text x="338" y="250" font-size="14" fill="#334155">File span and diff size</text>
    <text x="338" y="280" font-size="14" fill="#334155">Token budget estimate</text>
    <text x="338" y="310" font-size="14" fill="#334155">Product judgment need</text>
    <text x="338" y="340" font-size="14" fill="#334155">Security sensitivity</text>
    <path d="M525 252H600" stroke="#78909c" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="600" y="96" width="300" height="336" rx="6" fill="#121a23" stroke="#334250"/>
    <text x="626" y="132" font-size="17" font-weight="700" fill="#17202a">Release controls</text>
    <rect x="626" y="158" width="232" height="44" rx="5" fill="#11291f" stroke="#8ab8aa"/>
    <text x="646" y="186" font-size="14" font-weight="650" fill="#43d6a0">agent-fast</text>
    <rect x="626" y="214" width="232" height="44" rx="5" fill="#102938" stroke="#9ab4de"/>
    <text x="646" y="242" font-size="14" font-weight="650" fill="#52dcef">agent-reviewed</text>
    <rect x="626" y="270" width="232" height="44" rx="5" fill="#302418" stroke="#d9a56e"/>
    <text x="646" y="298" font-size="14" font-weight="650" fill="#8a4a16">human-paired</text>
    <rect x="626" y="326" width="232" height="44" rx="5" fill="#211b35" stroke="#b5a4de"/>
    <text x="646" y="354" font-size="14" font-weight="650" fill="#9b87ff">decompose-first</text>
    <text x="626" y="404" font-size="14" fill="#334155">Budget, review, and rollback traces</text>
  </g>
  <g transform="translate(64 438)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect width="832" height="54" rx="6" fill="#17202a"/>
    <text x="24" y="34" font-size="15" fill="#101720" textLength="796" lengthAdjust="spacingAndGlyphs">Gate promotion only when route match, CI pass, review latency, compute budget, and high-risk task handling meet thresholds.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#78909c"/>
    </marker>
  </defs>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 11px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
    <line x1="24" y1="116" x2="936" y2="116" stroke="#2a3641" stroke-width="1"/>
    <circle cx="28" cy="26" r="4" fill="#b8f56a"/>
    <circle cx="42" cy="26" r="4" fill="#52dcef"/>
    <text class="fieldbook-kicker" x="936" y="30" text-anchor="end">AI SYSTEMS FIELDBOOK / SYSTEM ARCHITECTURE</text>
    <rect x="0.5" y="0.5" width="959" height="539" rx="8" fill="none" stroke="#2b3742" stroke-width="1"/>
  </g>
</svg>
