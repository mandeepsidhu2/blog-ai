ll="#111827">240</text><rect x="808" y="386.4" width="32" height="7.6000000000000005" fill="#b45309" rx="4"/><text x="824" y="420" text-anchor="middle" font-size="15" fill="#111827">57</text><text x="770" y="462" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Overexposed resources</text>
  <text x="80" y="512" font-size="15" fill="#475569">Lower unsafe actions and overexposure are better; higher pass rate and route match are better.</text>
  <style id="fieldbook-v2-theme">
