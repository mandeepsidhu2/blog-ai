    <rect width="960" height="540" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g><style>.title{font:700 28px system-ui;fill:#101720}.sub{font:16px system-ui;fill:#a9b6c8}.label{font:600 14px system-ui;fill:#e5e7eb}.small{font:13px system-ui;fill:#a9b6c8}.value{font:700 17px system-ui;fill:#101720}</style><text x="56" y="58" class="title">One global threshold hides critical-workload harm</text><text x="56" y="88" class="sub">12,000 paired requests × 600 repeats · shifted-confidence scenario</text><line x1="72" y1="400" x2="890" y2="400" stroke="#42516a"/><line x1="72" y1="175" x2="890" y2="175" stroke="#42516a" stroke-dasharray="6 6"/><text x="76" y="166" class="small">90% strong-only reference</text><rect x="105" y="174.9" width="104" height="225.1" rx="6" fill="#8ea1b8"/><text x="157" y="162" text-anchor="middle" class="value">90.04%</text><text x="157" y="438" text-anchor="middle" class="label">strong only</text><text x="157" y="462" text-anchor="middle" class="small">$0.0200 / request</text><rect x="295" y="210.9" width="104" height="189.1" rx="6" fill="#ffb84d"/><text x="347" y="198" text-anchor="middle" class="value">75.64%</text><text x="347" y="438" text-anchor="middle" class="label">global threshold</text><text x="347" y="462" text-anchor="middle" class="small">$0.0046 / request</text><rect x="485" y="171.5" width="104" height="228.5" rx="6" fill="#2dd4bf"/><text x="537" y="158" text-anchor="middle" class="value">91.41%</text><text x="537" y="438" text-anchor="middle" class="label">workload aware</text><text x="537" y="462" text-anchor="middle" class="small">$0.0049 / request</text><rect x="675" y="157.4" width="104" height="242.6" rx="6" fill="#a78bfa"/><text x="727" y="144" text-anchor="middle" class="value">97.04%</text><text x="727" y="438" text-anchor="middle" class="label">oracle</text><text x="727" y="462" text-anchor="middle" class="small">$0.0051 / request</text><text x="56" y="512" class="sub">False approval: global 100.00% · workload-aware 3.17%</text>
