<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded"><title>Critical-workload accuracy under four cascade policies</title><desc>Measured critical accuracy and per-request cost across strong-only, global threshold, workload-aware threshold, and oracle routing in 600 repeats.</desc>
