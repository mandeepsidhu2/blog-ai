<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title id="title">Healthcare AI agent release gate architecture</title>
  <desc id="desc">Architecture diagram showing healthcare AI agent requests routed through evidence, data, clinician signoff, patient communication, and blocked workflow gates before clinical systems are touched.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="960" height="540" fill="#080c12"/>
    <rect width="960" height="540" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <text x="54" y="64" class="title" textLength="84" lengthAdjust="spacingAndGlyphs">Healthcare agent workflow gates</text>
  <text x="54" y="98" class="subtitle" textLength="878" lengthAdjust="spacingAndGlyphs">Separate benchmark success from clinical authority before agents read records, draft notes, contact patients, or alter workflow data.</text>
  <g transform="translate(54 145)">
    <rect x="0" y="0" width="170" height="78" rx="8" fill="#102938" stroke="#52dcef"/>
    <text x="18" y="34" class="boxTitle">Agent request</text>
    <text x="18" y="58" class="boxText" textLength="120" lengthAdjust="spacingAndGlyphs">task, data, intent</text>
    <path d="M180 39 H250" class="arrow"/>
    <rect x="260" y="-22" width="210" height="122" rx="8" fill="#11291f" stroke="#43d6a0"/>
    <text x="282" y="20" class="boxTitle" textLength="36" lengthAdjust="spacingAndGlyphs">Workflow classifier</text>
    <text x="282" y="46" class="boxText" textLength="36" lengthAdjust="spacingAndGlyphs">patient impact</text>
    <text x="282" y="68" class="boxText" textLength="36" lengthAdjust="spacingAndGlyphs">data access</text>
    <text x="282" y="90" class="boxText">modality burden</text>
    <path d="M480 39 H550" class="arrow"/>
    <rect x="560" y="-22" width="280" height="122" rx="8" fill="#302418" stroke="#ff9b55"/>
    <text x="582" y="20" class="boxTitle" textLength="96" lengthAdjust="spacingAndGlyphs">Release gate</text>
    <text x="582" y="46" class="boxText" textLength="96" lengthAdjust="spacingAndGlyphs">route, signoff, audit trace</text>
    <text x="582" y="68" class="boxText" textLength="96" lengthAdjust="spacingAndGlyphs">privacy scope</text>
    <text x="582" y="90" class="boxText">rollback threshold</text>
  </g>
  <g transform="translate(90 310)">
    <rect x="0" y="0" width="150" height="80" rx="8" fill="#121a23" stroke="#334250"/>
    <text x="22" y="34" class="route">research only</text>
    <text x="22" y="58" class="small">public evidence</text>
    <rect x="180" y="0" width="150" height="80" rx="8" fill="#121a23" stroke="#334250"/>
    <text x="202" y="34" class="route">data repair</text>
    <text x="202" y="58" class="small">audited changes</text>
    <rect x="360" y="0" width="150" height="80" rx="8" fill="#121a23" stroke="#334250"/>
    <text x="382" y="34" class="route" textLength="116" lengthAdjust="spacingAndGlyphs">clinician review</text>
    <text x="382" y="58" class="small" textLength="116" lengthAdjust="spacingAndGlyphs">no autopilot care</text>
    <rect x="540" y="0" width="150" height="80" rx="8" fill="#121a23" stroke="#334250"/>
    <text x="562" y="34" class="route">patient comms</text>
    <text x="562" y="58" class="small" textLength="116" lengthAdjust="spacingAndGlyphs">signed before send</text>
    <rect x="720" y="0" width="150" height="80" rx="8" fill="#32191e" stroke="#e11d48"/>
    <text x="742" y="34" class="route">blocked</text>
    <text x="742" y="58" class="small" textLength="116" lengthAdjust="spacingAndGlyphs">unsafe authority</text>
  </g>
  <text x="54" y="468" class="note" textLength="878" lengthAdjust="spacingAndGlyphs">Operational signal: release only when unsafe action, signoff miss, patient-message miss, and unsupported-modality counts are zero.</text>
  <style>
    .title { font: 700 34px Inter, system-ui, sans-serif; fill: #0f172a; }
    .subtitle, .note { font: 16px Inter, system-ui, sans-serif; fill: #334155; }
    .boxTitle, .route { font: 700 16px Inter, system-ui, sans-serif; fill: #0f172a; }
    .boxText, .small { font: 14px Inter, system-ui, sans-serif; fill: #475569; }
    .arrow { stroke: #64748b; stroke-width: 3; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 11px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
    <line x1="24" y1="116" x2="936" y2="116" stroke="#2a3641" stroke-width="1"/>
    <circle cx="28" cy="26" r="4" fill="#b8f56a"/>
    <circle cx="42" cy="26" r="4" fill="#52dcef"/>
    <text class="fieldbook-kicker" x="936" y="30" text-anchor="end">AI SYSTEMS FIELDBOOK / SYSTEM ARCHITECTURE</text>
    <rect x="0.5" y="0.5" width="959" height="539" rx="8" fill="none" stroke="#2b3742" stroke-width="1"/>
  </g>
</svg>
