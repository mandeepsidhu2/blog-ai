<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Healthcare AI agent release gate architecture</title>
  <desc id="desc">Architecture diagram showing healthcare AI agent requests routed through evidence, data, clinician signoff, patient communication, and blocked workflow gates before clinical systems are touched.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="54" y="64" class="title">Healthcare agent workflow gates</text>
  <text x="54" y="98" class="subtitle">Separate benchmark success from clinical authority before agents read records, draft notes, contact patients, or alter workflow data.</text>
  <g transform="translate(54 145)">
    <rect x="0" y="0" width="170" height="78" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="18" y="34" class="boxTitle">Agent request</text>
    <text x="18" y="58" class="boxText">task, data, intent</text>
    <path d="M180 39 H250" class="arrow"/>
    <rect x="260" y="-22" width="210" height="122" rx="8" fill="#ecfdf5" stroke="#059669"/>
    <text x="282" y="20" class="boxTitle">Workflow classifier</text>
    <text x="282" y="46" class="boxText">patient impact</text>
    <text x="282" y="68" class="boxText">data access</text>
    <text x="282" y="90" class="boxText">modality burden</text>
    <path d="M480 39 H550" class="arrow"/>
    <rect x="560" y="-22" width="280" height="122" rx="8" fill="#fff7ed" stroke="#ea580c"/>
    <text x="582" y="20" class="boxTitle">Release gate</text>
    <text x="582" y="46" class="boxText">route, signoff, audit trace</text>
    <text x="582" y="68" class="boxText">privacy scope</text>
    <text x="582" y="90" class="boxText">rollback threshold</text>
  </g>
  <g transform="translate(90 310)">
    <rect x="0" y="0" width="150" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="22" y="34" class="route">research only</text>
    <text x="22" y="58" class="small">public evidence</text>
    <rect x="180" y="0" width="150" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="202" y="34" class="route">data repair</text>
    <text x="202" y="58" class="small">audited changes</text>
    <rect x="360" y="0" width="150" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="382" y="34" class="route">clinician review</text>
    <text x="382" y="58" class="small">no autopilot care</text>
    <rect x="540" y="0" width="150" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="562" y="34" class="route">patient comms</text>
    <text x="562" y="58" class="small">signed before send</text>
    <rect x="720" y="0" width="150" height="80" rx="8" fill="#fff1f2" stroke="#e11d48"/>
    <text x="742" y="34" class="route">blocked</text>
    <text x="742" y="58" class="small">unsafe authority</text>
  </g>
  <text x="54" y="468" class="note">Operational signal: release only when unsafe action, signoff miss, patient-message miss, and unsupported-modality counts are zero.</text>
  <style>
    .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
    .subtitle, .note { font: 16px Arial, sans-serif; fill: #334155; }
    .boxTitle, .route { font: 700 16px Arial, sans-serif; fill: #0f172a; }
    .boxText, .small { font: 14px Arial, sans-serif; fill: #475569; }
    .arrow { stroke: #64748b; stroke-width: 3; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
