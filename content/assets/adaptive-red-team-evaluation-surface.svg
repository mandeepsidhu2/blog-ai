<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title>Adaptive red-team evidence surface</title>
  <desc>A two-axis evidence map placing static suites, adaptive attacks, held-out environments, and contained live transfer by attack adaptivity and deployment realism.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="1200" height="675" fill="#080c12"/>
    <rect width="1200" height="675" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <text x="62" y="60" class="title">Red-team evidence needs adaptivity and transfer</text>
  <text x="62" y="92" class="sub">Published signals retain their own denominators · do not average scenario, objective, attempt, and benchmark rates</text>
  <line x1="150" y1="555" x2="1095" y2="555" stroke="#9fb0ca" stroke-width="2"/>
  <line x1="150" y1="555" x2="150" y2="155" stroke="#9fb0ca" stroke-width="2"/>
  <text x="620" y="610" text-anchor="middle" class="axis">ATTACK ADAPTIVITY →</text>
  <text x="45" y="360" transform="rotate(-90 45 360)" text-anchor="middle" class="axis">DEPLOYMENT REALISM →</text>
  <g stroke="#263650">
    <line x1="150" y1="455" x2="1095" y2="455"/><line x1="150" y1="355" x2="1095" y2="355"/><line x1="150" y1="255" x2="1095" y2="255"/>
    <line x1="385" y1="155" x2="385" y2="555"/><line x1="620" y1="155" x2="620" y2="555"/><line x1="855" y1="155" x2="855" y2="555"/>
  </g>
  <text x="165" y="582" class="tick">fixed templates</text><text x="930" y="582" class="tick">feedback-driven search</text>
  <text x="128" y="540" text-anchor="end" class="tick">static</text><text x="128" y="180" text-anchor="end" class="tick">live</text>
  <g>
    <circle cx="300" cy="495" r="23" fill="#5b8def"/><text x="300" y="500" text-anchor="middle" class="num">1</text>
    <text x="335" y="482" class="label">Regression suite</text><text x="335" y="502" class="muted">reproducible, narrow coverage</text>
    <circle cx="690" cy="422" r="23" fill="#f4b860"/><text x="690" y="427" text-anchor="middle" class="num">2</text>
    <text x="725" y="410" class="label">Adaptive staging</text><text x="725" y="430" class="muted">budget-matched attacker search</text>
    <circle cx="845" cy="315" r="27" fill="#5bc0be"/><text x="845" y="320" text-anchor="middle" class="num">84</text>
    <text x="885" y="295" class="label">Held-out arena</text><text x="885" y="315" class="muted">GPT-Red 84% scenarios</text><text x="885" y="335" class="muted">humans 13% · internal mirror</text>
    <circle cx="990" cy="205" r="27" fill="#ef6f6c"/><text x="990" y="210" text-anchor="middle" class="num">3/3</text>
    <text x="800" y="190" class="label">Contained live transfer</text><text x="800" y="210" class="muted">three vending objectives</text><text x="800" y="230" class="muted">one deployment case</text>
    <circle cx="520" cy="330" r="23" fill="#b28dff"/><text x="520" y="335" text-anchor="middle" class="num">1356</text>
    <text x="350" y="302" class="label">ACIArena</text><text x="350" y="322" class="muted">1,356 cases · 6 MAS stacks</text><text x="350" y="342" class="muted">different benchmark and goals</text>
  </g>
  <rect x="160" y="125" width="925" height="38" fill="#111b2d" stroke="#34435e"/>
  <text x="180" y="149" class="note">Production rule: adaptive attacks discover failures; deterministic authorization still blocks side effects.</text>
  <text x="62" y="650" class="foot">Sources: OpenAI GPT-Red (July 15, 2026); Dziemian et al.; ACL 2026 PIArena and ACIArena. Bubble numbers use incompatible denominators.</text>
  <style>
    .title{font:700 28px ui-monospace,monospace;fill:#f2f6ff}.sub,.foot,.muted{font:13px ui-monospace,monospace;fill:#9fb0ca}
    .axis{font:700 14px ui-monospace,monospace;fill:#c7d3e6}.tick{font:12px ui-monospace,monospace;fill:#9fb0ca}
    .label{font:700 15px ui-monospace,monospace;fill:#e6edf7}.num{font:700 12px ui-monospace,monospace;fill:#08101c}.note{font:14px ui-monospace,monospace;fill:#f2f6ff}
  </style>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 13px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
    <circle cx="28" cy="26" r="4" fill="#b8f56a"/>
    <circle cx="42" cy="26" r="4" fill="#52dcef"/>
    <text class="fieldbook-kicker" x="1176" y="30" text-anchor="end">AI SYSTEMS FIELDBOOK / SYSTEM ARCHITECTURE</text>
    <rect x="0.5" y="0.5" width="1199" height="674" rx="8" fill="none" stroke="#2b3742" stroke-width="1"/>
  </g>
</svg>
