<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded"><title>Orphaned worker time under fan-out cancellation policies</title><desc>Bar chart of measured orphan worker seconds per parent request in the bursty scenario, with success rates for four cancellation policies.</desc>
