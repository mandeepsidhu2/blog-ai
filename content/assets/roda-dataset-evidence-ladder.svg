<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded"><title>RODA dataset evidence ladder</title><desc>Evidence ladder separating catalog discovery and file sampling from provider verification, governed snapshots, and task fitness.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="960" height="540" fill="#080c12"/>
    <rect width="960" height="540" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g><style>.t{font:700 27px system-ui;fill:#101720}.s{font:15px system-ui;fill:#a9b6c8}.h{font:700 18px system-ui;fill:#101720}.b{font:14px system-ui;fill:#dbe4f0}.tag{font:700 13px system-ui;fill:#09111f}</style><text x="48" y="54" class="t" textLength="130" lengthAdjust="spacingAndGlyphs">Dataset discovery is the first rung, not approval</text><text x="48" y="84" class="s">RODA MCP · July 7, 2026 · 10 tools · first 100 KB sampling boundary</text><g transform="translate(60 425)"><rect width="190" height="62" rx="7" fill="#23415f"/><text x="18" y="27" class="h">Catalog search</text><text x="18" y="49" class="b">1,100+ datasets</text></g><g transform="translate(225 345)"><rect width="190" height="62" rx="7" fill="#28536d"/><text x="18" y="27" class="h">Metadata + tier</text><text x="18" y="49" class="b" textLength="160" lengthAdjust="spacingAndGlyphs">license string · access</text></g><g transform="translate(390 265)"><rect width="190" height="62" rx="7" fill="#2c6974"/><text x="18" y="27" class="h">Preview + sample</text><text x="18" y="49" class="b" textLength="160" lengthAdjust="spacingAndGlyphs">layout · first 100 KB</text></g><g transform="translate(555 185)"><rect width="190" height="62" rx="7" fill="#2b7e78"/><text x="18" y="27" class="h">Verify provider</text><text x="18" y="49" class="b" textLength="160" lengthAdjust="spacingAndGlyphs">terms · consent · owner</text></g><g transform="translate(720 105)"><rect width="190" height="62" rx="7" fill="#2dd4bf"/><text x="18" y="27" class="h" fill="#09111f" textLength="160" lengthAdjust="spacingAndGlyphs">Governed snapshot</text><text x="18" y="49" class="tag" textLength="160" lengthAdjust="spacingAndGlyphs">hashes · schema · fitness</text></g><line x1="60" y1="505" x2="910" y2="85" stroke="#667b94" stroke-width="2" stroke-dasharray="7 7"/><text x="48" y="516" class="s">MCP accelerates discovery</text><text x="711" y="516" class="s" textLength="236" lengthAdjust="spacingAndGlyphs">Independent approval required →</text>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
