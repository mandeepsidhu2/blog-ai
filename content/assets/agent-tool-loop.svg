<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Agent tool loop with guardrails</title>
  <desc id="desc">Diagram showing model decisions routed through tool contracts, execution, trace logging, and bounded stopping conditions.</desc>
  <rect width="1600" height="900" fill="#f6f1e5"/>
  <rect x="96" y="88" width="1408" height="724" rx="24" fill="#16251f"/>
  <text x="150" y="166" fill="#f5d46c" font-family="Arial, sans-serif" font-size="56" font-weight="800">Minimal Agent Tool Loop</text>
  <circle cx="370" cy="438" r="128" fill="#fdfaf0" stroke="#86c6aa" stroke-width="6"/>
  <circle cx="800" cy="438" r="128" fill="#fdfaf0" stroke="#86c6aa" stroke-width="6"/>
  <circle cx="1230" cy="438" r="128" fill="#fdfaf0" stroke="#86c6aa" stroke-width="6"/>
  <g fill="#10241f" font-family="Arial, sans-serif" font-size="33" font-weight="800" text-anchor="middle">
    <text x="370" y="430">Model</text>
    <text x="370" y="468">decision</text>
    <text x="800" y="430">Tool</text>
    <text x="800" y="468">contract</text>
    <text x="1230" y="430">Trace</text>
    <text x="1230" y="468">and stop</text>
  </g>
  <path d="M500 438h170" stroke="#f5d46c" stroke-width="9" stroke-linecap="round"/>
  <path d="M930 438h170" stroke="#f5d46c" stroke-width="9" stroke-linecap="round"/>
  <path d="M1220 574c-170 120-640 120-820 0" fill="none" stroke="#86c6aa" stroke-width="8" stroke-linecap="round"/>
  <text x="150" y="688" fill="#d7e7dc" font-family="Arial, sans-serif" font-size="28">Production gates: schema validation, step limits, tool allowlists, trace IDs, and cost per completed task.</text>
</svg>
