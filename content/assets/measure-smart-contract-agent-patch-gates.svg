    <text x="220" y="448" text-anchor="end" font-size="12" fill="#475569">False confidence</text><rect x="240" y="436" width="130" height="14" rx="3" fill="#ffb84d"/><text x="378" y="448" font-size="12" fill="#172033">3</text>
    <line x1="240" y1="476" x2="760" y2="476" stroke="#334250"/>
    <text x="240" y="500" font-size="12" fill="#64748b">0</text>
