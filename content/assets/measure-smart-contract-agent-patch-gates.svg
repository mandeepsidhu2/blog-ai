    <text x="220" y="144" text-anchor="end" font-size="12" fill="#475569">Exploit validated</text><rect x="240" y="132" width="0" height="14" rx="3" fill="#52dcef"/><text x="248" y="144" font-size="12" fill="#172033">0</text>
    <text x="220" y="164" text-anchor="end" font-size="12" fill="#475569">Patch accepted</text><rect x="240" y="152" width="0" height="14" rx="3" fill="#b8f56a"/><text x="248" y="164" font-size="12" fill="#172033">0</text>
    <text x="220" y="184" text-anchor="end" font-size="12" fill="#475569">Unsafe autonomy</text><rect x="240" y="172" width="217" height="14" rx="3" fill="#ff657a"/><text x="465" y="184" font-size="12" fill="#172033">5</text>
    <text x="220" y="204" text-anchor="end" font-size="12" fill="#475569">False confidence</text><rect x="240" y="192" width="390" height="14" rx="3" fill="#ffb84d"/><text x="638" y="204" font-size="12" fill="#172033">9</text>
    <text x="44" y="260" font-size="18" font-weight="700" fill="#172033">forkValidated</text>
    <text x="220" y="246" text-anchor="end" font-size="12" fill="#475569">Detected</text><rect x="240" y="234" width="477" height="14" rx="3" fill="#52dcef"/><text x="725" y="246" font-size="12" fill="#172033">11</text>
    <text x="220" y="266" text-anchor="end" font-size="12" fill="#475569">Exploit validated</text><rect x="240" y="254" width="390" height="14" rx="3" fill="#52dcef"/><text x="638" y="266" font-size="12" fill="#172033">9</text>
    <text x="220" y="286" text-anchor="end" font-size="12" fill="#475569">Patch accepted</text><rect x="240" y="274" width="0" height="14" rx="3" fill="#b8f56a"/><text x="248" y="286" font-size="12" fill="#172033">0</text>
