<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" data-text-fit="bounded" data-visual-quality="publication" data-visual-system="fieldbook-v2"><title>Critical regression detection power by canary sampling policy</title><desc>Risk-weighted and balanced sampling sharply increase detection power for a one-percent critical stratum, while reducing effective population sample size.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="960" height="540" fill="#080c12"/>
    <rect width="960" height="540" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#081426"/><stop offset="1" stop-color="#152238"/></linearGradient></defs><text x="64" y="58" class="title">Rare regressions disappear in population samples</text><text x="64" y="88" class="subtitle">4,000 repeats · 400 paired cases · one-sided exact sign test · heterogeneous confirmatory scenario</text><line x1="74" y1="355" x2="875" y2="355" stroke="#64748b"/><line x1="74" y1="155" x2="875" y2="155" stroke="#334155" stroke-dasharray="5 6"/><text x="52" y="360" class="axis">0%</text><text x="42" y="161" class="axis">100%</text><g><rect x="110" y="354.5" width="150" height="0.5" rx="8" fill="#67e8f9"/><text x="185" y="338.5" text-anchor="middle" class="value">0.3%</text><text x="185" y="390" text-anchor="middle" class="label">Population sample</text><text x="185" y="416" text-anchor="middle" class="small">critical n=4 · N_eff=400</text></g><g><rect x="360" y="159.6" width="150" height="195.4" rx="8" fill="#ffb84d"/><text x="435" y="143.6" text-anchor="middle" class="value">97.7%</text><text x="435" y="390" text-anchor="middle" class="label">Risk weighted</text><text x="435" y="416" text-anchor="middle" class="small">critical n=80 · N_eff=256</text></g><g><rect x="610" y="155.1" width="150" height="199.9" rx="8" fill="#a78bfa"/><text x="685" y="139.1" text-anchor="middle" class="value">100.0%</text><text x="685" y="390" text-anchor="middle" class="label">Balanced strata</text><text x="685" y="416" text-anchor="middle" class="small">critical n=133 · N_eff=157</text></g><rect x="66" y="454" width="828" height="54" rx="8" fill="#0f1f34" stroke="#334155"/><text x="86" y="478" class="note">Detection and estimation are different jobs:</text><text x="86" y="499" class="small">risk weighting finds the critical regression; inverse-probability weights are still required for population prevalence.</text><style>.title{font:700 28px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#101720}.subtitle,.label,.small,.axis,.note,.value{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.subtitle{font-size:13px;fill:#40515f}.label{font-size:15px;font-weight:700;fill:#253240}.small{font-size:12px;fill:#40515f}.axis{font-size:12px;fill:#40515f}.note{font-size:14px;font-weight:700;fill:#101720}.value{font-size:22px;font-weight:800;fill:#101720}</style>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 11px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
    <line x1="24" y1="116" x2="936" y2="116" stroke="#2a3641" stroke-width="1"/>
    <circle cx="28" cy="26" r="4" fill="#b8f56a"/>
    <circle cx="42" cy="26" r="4" fill="#52dcef"/>
    <text class="fieldbook-kicker" x="936" y="30" text-anchor="end">AI SYSTEMS FIELDBOOK / SYSTEM ARCHITECTURE</text>
    <rect x="0.5" y="0.5" width="959" height="539" rx="8" fill="none" stroke="#2b3742" stroke-width="1"/>
  </g>
</svg>
