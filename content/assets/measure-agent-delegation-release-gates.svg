<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" role="img" aria-labelledby="title desc">
  <title id="title">Agent delegation release gate metrics</title>
  <desc id="desc">Bar chart comparing optimistic, reviewed, and production policy profiles on accuracy, missed incident rate, and overblock rate.</desc>
  <rect width="920" height="440" fill="#f7fbf8"/>
  <text x="48" y="52" font-size="27" font-weight="800" fill="#172026">Agent delegation release gates</text>
  <text x="48" y="82" font-size="15" fill="#475467">Accuracy rises when cloud, tool, customer-data, and untrusted-instruction boundaries are enforced.</text>
  <line x1="52" y1="310" x2="870" y2="310" stroke="#98a2b3" stroke-width="1"/>
  <line x1="52" y1="90" x2="52" y2="310" stroke="#98a2b3" stroke-width="1"/>
  <rect x="80" y="172" width="42" height="138" rx="4" fill="#216869"/><text x="101" y="164" text-anchor="middle" font-size="13" fill="#172026">0.63</text><text x="101" y="335" text-anchor="middle" font-size="12" fill="#344054">accuracy</text>
<rect x="150" y="145" width="42" height="165" rx="4" fill="#b23a48"/><text x="171" y="137" text-anchor="middle" font-size="13" fill="#172026">0.75</text><text x="171" y="335" text-anchor="middle" font-size="12" fill="#344054">missed</text>
<rect x="220" y="310" width="42" height="0" rx="4" fill="#d48c06"/><text x="241" y="302" text-anchor="middle" font-size="13" fill="#172026">0.00</text><text x="241" y="335" text-anchor="middle" font-size="12" fill="#344054">overblock</text>
<rect x="360" y="90" width="42" height="220" rx="4" fill="#216869"/><text x="381" y="82" text-anchor="middle" font-size="13" fill="#172026">1.00</text><text x="381" y="335" text-anchor="middle" font-size="12" fill="#344054">accuracy</text>
<rect x="430" y="310" width="42" height="0" rx="4" fill="#b23a48"/><text x="451" y="302" text-anchor="middle" font-size="13" fill="#172026">0.00</text><text x="451" y="335" text-anchor="middle" font-size="12" fill="#344054">missed</text>
<rect x="500" y="310" width="42" height="0" rx="4" fill="#d48c06"/><text x="521" y="302" text-anchor="middle" font-size="13" fill="#172026">0.00</text><text x="521" y="335" text-anchor="middle" font-size="12" fill="#344054">overblock</text>
<rect x="640" y="90" width="42" height="220" rx="4" fill="#216869"/><text x="661" y="82" text-anchor="middle" font-size="13" fill="#172026">1.00</text><text x="661" y="335" text-anchor="middle" font-size="12" fill="#344054">accuracy</text>
<rect x="710" y="310" width="42" height="0" rx="4" fill="#b23a48"/><text x="731" y="302" text-anchor="middle" font-size="13" fill="#172026">0.00</text><text x="731" y="335" text-anchor="middle" font-size="12" fill="#344054">missed</text>
<rect x="780" y="310" width="42" height="0" rx="4" fill="#d48c06"/><text x="801" y="302" text-anchor="middle" font-size="13" fill="#172026">0.00</text><text x="801" y="335" text-anchor="middle" font-size="12" fill="#344054">overblock</text>
  <text x="165" y="380" text-anchor="middle" font-size="17" font-weight="700" fill="#172026">optimistic</text>
<text x="445" y="380" text-anchor="middle" font-size="17" font-weight="700" fill="#172026">reviewed</text>
<text x="725" y="380" text-anchor="middle" font-size="17" font-weight="700" fill="#172026">production</text>
  <rect x="48" y="402" width="18" height="18" fill="#216869" rx="3"/><text x="74" y="416" font-size="13" fill="#344054">accuracy</text>
  <rect x="170" y="402" width="18" height="18" fill="#b23a48" rx="3"/><text x="196" y="416" font-size="13" fill="#344054">missed incidents</text>
  <rect x="326" y="402" width="18" height="18" fill="#d48c06" rx="3"/><text x="352" y="416" font-size="13" fill="#344054">overblocked safe tasks</text>
</svg>
