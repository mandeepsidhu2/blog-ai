<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded"><title>Pairwise judge estimates under position and style bias</title><desc>Candidate win-rate estimates across five evaluation policies in 800 repeated samples of 500 pairs, compared with the 48 percent latent truth.</desc>
