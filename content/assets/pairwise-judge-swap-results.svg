  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="960" height="540" fill="#080c12"/>
    <rect width="960" height="540" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g><style>.title{font:700 28px system-ui;fill:#101720}.sub{font:16px system-ui;fill:#a9b6c8}.label{font:600 13px system-ui;fill:#e5e7eb}.value{font:700 17px system-ui;fill:#101720}.note{font:14px system-ui;fill:#a9b6c8}</style><text x="52" y="58" class="title">Order swapping fixes only the bias it can see</text><text x="52" y="88" class="sub">800 repeats × 500 pairs · 48% true candidate win probability</text><line x1="54" y1="405" x2="910" y2="405" stroke="#42516a"/><line x1="54" y1="317" x2="910" y2="317" stroke="#101720" stroke-dasharray="7 7"/><text x="60" y="307" class="note">48% latent truth</text><rect x="82" y="405" width="108" height="-284.85599999999937" rx="6" fill="#fb7185"/><text x="136" y="108.14400000000063" text-anchor="middle" class="value">65.90%</text><text x="136" y="438" text-anchor="middle" class="label">candidate first</text><rect x="252" y="405" width="108" height="-175.07049999999933" rx="6" fill="#ffb84d"/><text x="306" y="217.92950000000067" text-anchor="middle" class="value">55.92%</text><text x="306" y="438" text-anchor="middle" class="label">random one</text><rect x="422" y="405" width="108" height="-191.9379806412419" rx="6" fill="#a78bfa"/><text x="476" y="201.0620193587581" text-anchor="middle" class="value">57.45%</text><text x="476" y="438" text-anchor="middle" class="label">swap + drop</text><rect x="592" y="405" width="108" height="-175.64112500000007" rx="6" fill="#38bdf8"/><text x="646" y="217.35887499999993" text-anchor="middle" class="value">55.97%</text><text x="646" y="438" text-anchor="middle" class="label">swap + tie</text><rect x="762" y="405" width="108" height="-171.3332499999994" rx="6" fill="#2dd4bf"/><text x="816" y="221.6667500000006" text-anchor="middle" class="value">55.58%</text><text x="816" y="438" text-anchor="middle" class="label">swap + review</text><text x="52" y="500" class="note">Discordant swaps expose position instability; consistent style-correlated errors survive every swap.</text>
