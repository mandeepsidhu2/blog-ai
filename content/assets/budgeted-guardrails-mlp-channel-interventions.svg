<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Budgeted MLP channel guardrail comparison</title>
  <desc id="desc">Summary graphic comparing fixed gates, dropout, and budgeted MLP channel gates on trajectory loss deltas in small Transformer training.</desc>
  <rect width="1600" height="900" fill="#f6f7f2"/>
  <rect x="70" y="70" width="1460" height="760" rx="28" fill="#101827"/>

  <text x="130" y="150" fill="#f8fafc" font-family="Arial, sans-serif" font-size="54" font-weight="900">Budgeted MLP Channel Guardrails</text>
  <text x="130" y="208" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="30">Small Transformer training runs: trajectory-loss delta against paired baseline.</text>

  <rect x="130" y="268" width="410" height="415" rx="24" fill="#f8fafc"/>
  <rect x="595" y="268" width="410" height="415" rx="24" fill="#f8fafc"/>
  <rect x="1060" y="268" width="410" height="415" rx="24" fill="#f8fafc"/>

  <text x="175" y="342" fill="#7f1d1d" font-family="Arial, sans-serif" font-size="40" font-weight="900">Fixed gates</text>
  <text x="640" y="342" fill="#7c2d12" font-family="Arial, sans-serif" font-size="40" font-weight="900">Dropout 0.02</text>
  <text x="1105" y="342" fill="#064e3b" font-family="Arial, sans-serif" font-size="40" font-weight="900">Budgeted gates</text>

  <g font-family="Arial, sans-serif" font-size="30" font-weight="800">
    <text x="175" y="420" fill="#0f172a">WikiText-2: +0.0146</text>
    <text x="175" y="474" fill="#0f172a">TinyStories: +0.0183</text>
    <text x="175" y="528" fill="#991b1b">Trajectory wins: 0/10</text>

    <text x="640" y="420" fill="#0f172a">WikiText-2: +0.0203</text>
    <text x="640" y="474" fill="#0f172a">TinyStories: +0.0163</text>
    <text x="640" y="528" fill="#9a3412">Trajectory wins: 0/10</text>

    <text x="1105" y="420" fill="#0f172a">WikiText-2: near baseline</text>
    <text x="1105" y="474" fill="#0f172a">TinyStories: near baseline</text>
    <text x="1105" y="528" fill="#047857">Strict event budgets</text>
  </g>

  <g>
    <rect x="175" y="584" width="310" height="38" rx="12" fill="#dc2626"/>
    <rect x="640" y="584" width="330" height="38" rx="12" fill="#ea580c"/>
    <rect x="1105" y="584" width="72" height="38" rx="12" fill="#0f766e"/>
    <line x1="1105" y1="648" x2="1425" y2="648" stroke="#94a3b8" stroke-width="5"/>
    <circle cx="1140" cy="648" r="12" fill="#0f766e"/>
    <text x="175" y="656" fill="#475569" font-family="Arial, sans-serif" font-size="24" font-weight="800">higher trajectory damage</text>
    <text x="640" y="656" fill="#475569" font-family="Arial, sans-serif" font-size="24" font-weight="800">higher trajectory damage</text>
    <text x="1105" y="700" fill="#475569" font-family="Arial, sans-serif" font-size="24" font-weight="800">clustered near paired baseline</text>
  </g>

  <rect x="130" y="730" width="1340" height="70" rx="18" fill="#fbbf24"/>
  <text x="170" y="775" fill="#111827" font-family="Arial, sans-serif" font-size="31" font-weight="900">Portfolio signal: negative controls, paired seeds, trajectory metrics, and reproducible artifacts.</text>
</svg>
