<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title id="title">Budgeted MLP channel guardrail comparison</title>
  <desc id="desc">Summary graphic comparing fixed gates, dropout, and budgeted MLP channel gates on trajectory loss deltas in small Transformer training.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="1600" height="900" fill="#080c12"/>
    <rect width="1600" height="900" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <rect x="70" y="70" width="1460" height="760" rx="8" fill="#101827"/>

  <text x="130" y="150" fill="#101720" font-family="Inter, system-ui, sans-serif" font-size="54" font-weight="900">Budgeted MLP Channel Guardrails</text>
  <text x="130" y="208" fill="#334250" font-family="Inter, system-ui, sans-serif" font-size="30">Small Transformer training runs: trajectory-loss delta against paired baseline.</text>

  <rect x="130" y="268" width="410" height="415" rx="8" fill="#101720"/>
  <rect x="595" y="268" width="410" height="415" rx="8" fill="#101720"/>
  <rect x="1060" y="268" width="410" height="415" rx="8" fill="#101720"/>

  <text x="175" y="342" fill="#7f1d1d" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="900">Fixed gates</text>
  <text x="640" y="342" fill="#7c2d12" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="900">Dropout 0.02</text>
  <text x="1105" y="342" fill="#064e3b" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="900">Budgeted gates</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800">
    <text x="175" y="420" fill="#0f172a">WikiText-2: +0.0146</text>
    <text x="175" y="474" fill="#0f172a">TinyStories: +0.0183</text>
    <text x="175" y="528" fill="#991b1b">Trajectory wins: 0/10</text>

    <text x="640" y="420" fill="#0f172a">WikiText-2: +0.0203</text>
    <text x="640" y="474" fill="#0f172a">TinyStories: +0.0163</text>
    <text x="640" y="528" fill="#9a3412">Trajectory wins: 0/10</text>

    <text x="1105" y="420" fill="#0f172a">WikiText-2: near baseline</text>
    <text x="1105" y="474" fill="#0f172a">TinyStories: near baseline</text>
    <text x="1105" y="528" fill="#43d6a0">Strict event budgets</text>
  </g>

  <g>
    <rect x="175" y="584" width="310" height="38" rx="8" fill="#ff657a"/>
    <rect x="640" y="584" width="330" height="38" rx="8" fill="#ff9b55"/>
    <rect x="1105" y="584" width="72" height="38" rx="8" fill="#43d6a0"/>
    <line x1="1105" y1="648" x2="1425" y2="648" stroke="#40515f" stroke-width="5"/>
    <circle cx="1140" cy="648" r="12" fill="#43d6a0"/>
    <text x="175" y="656" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">higher trajectory damage</text>
    <text x="640" y="656" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">higher trajectory damage</text>
    <text x="1105" y="700" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">clustered near paired baseline</text>
  </g>

  <rect x="130" y="730" width="1340" height="70" rx="8" fill="#925d18"/>
  <text x="170" y="775" fill="#111827" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="900" textLength="1288" lengthAdjust="spacingAndGlyphs">Portfolio signal: negative controls, paired seeds, trajectory metrics, and reproducible artifacts.</text>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 18px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
    <circle cx="28" cy="26" r="4" fill="#b8f56a"/>
    <circle cx="42" cy="26" r="4" fill="#52dcef"/>
    <text class="fieldbook-kicker" x="1576" y="30" text-anchor="end">AI SYSTEMS FIELDBOOK / RESEARCH RESULT</text>
    <rect x="0.5" y="0.5" width="1599" height="899" rx="8" fill="none" stroke="#2b3742" stroke-width="1"/>
  </g>
</svg>
