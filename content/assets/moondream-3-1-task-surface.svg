<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded"><title>Moondream 3.1 task comparison surface</title><desc>Matrix of vendor-reported Moondream 3.1 benchmark margins versus Qwen3.5 across detection, referring, and counting tasks.</desc>
