<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Agent app consent gate architecture</title>
  <desc id="desc">Diagram showing manifest review, consent copy, token binding, UI containment, trace logging, and rollout decisions for agent app releases.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7f2; }
      .lane { fill: #ffffff; stroke: #ced7ca; stroke-width: 2; }
      .head { fill: #17332f; }
      .headtext { font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; fill: #ffffff; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 31px; font-weight: 700; fill: #14241f; }
      .sub { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #4c5d55; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; fill: #14241f; }
      .body { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #3a4842; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #53625c; }
      .arrow { fill: none; stroke: #50655f; stroke-width: 3; marker-end: url(#arrow); }
      .ok { fill: #dff0e6; stroke: #2f7d5b; stroke-width: 2; }
      .warn { fill: #fff2cf; stroke: #b77a22; stroke-width: 2; }
      .stop { fill: #f8d9da; stroke: #b94043; stroke-width: 2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#50655f"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="540"/>
  <text class="title" x="48" y="58">Consent Gates for Agent Apps</text>
  <text class="sub" x="48" y="85">Treat manifests, UI components, tool scopes, and agent cards as release inputs.</text>

  <rect class="lane" x="48" y="128" width="172" height="276" rx="8"/>
  <rect class="head" x="48" y="128" width="172" height="44" rx="8"/>
  <text class="headtext" x="68" y="156">Manifest Review</text>
  <text class="label" x="68" y="207">Declare</text>
  <text class="body" x="68" y="232">provider identity</text>
  <text class="body" x="68" y="254">requested scopes</text>
  <text class="body" x="68" y="276">write actions</text>
  <text class="body" x="68" y="298">network targets</text>
  <text class="small" x="68" y="350">Reject vague authority</text>
  <text class="small" x="68" y="370">before user traffic.</text>

  <rect class="lane" x="278" y="128" width="172" height="276" rx="8"/>
  <rect class="head" x="278" y="128" width="172" height="44" rx="8"/>
  <text class="headtext" x="302" y="156">Consent Boundary</text>
  <text class="label" x="298" y="207">Explain</text>
  <text class="body" x="298" y="232">data access</text>
  <text class="body" x="298" y="254">write authority</text>
  <text class="body" x="298" y="276">confirmation path</text>
  <text class="body" x="298" y="298">client identity</text>
  <text class="small" x="298" y="350">Consent must match</text>
  <text class="small" x="298" y="370">the real tool path.</text>

  <rect class="lane" x="508" y="128" width="172" height="276" rx="8"/>
  <rect class="head" x="508" y="128" width="172" height="44" rx="8"/>
  <text class="headtext" x="536" y="156">Runtime Checks</text>
  <text class="label" x="528" y="207">Verify</text>
  <text class="body" x="528" y="232">token audience</text>
  <text class="body" x="528" y="254">per-client consent</text>
  <text class="body" x="528" y="276">CSP allowlists</text>
  <text class="body" x="528" y="298">card signatures</text>
  <text class="small" x="528" y="350">Block before the</text>
  <text class="small" x="528" y="370">side effect commits.</text>

  <rect class="lane" x="738" y="128" width="172" height="276" rx="8"/>
  <rect class="head" x="738" y="128" width="172" height="44" rx="8"/>
  <text class="headtext" x="778" y="156">Rollout Gate</text>
  <text class="label" x="758" y="207">Decide</text>
  <text class="body" x="758" y="232">allow safe reads</text>
  <text class="body" x="758" y="254">review migration risk</text>
  <text class="body" x="758" y="276">block unsafe writes</text>
  <text class="body" x="758" y="298">capture traces</text>
  <text class="small" x="758" y="350">Expand only after</text>
  <text class="small" x="758" y="370">gate metrics hold.</text>

  <path class="arrow" d="M 220 266 H 270"/>
  <path class="arrow" d="M 450 266 H 500"/>
  <path class="arrow" d="M 680 266 H 730"/>

  <rect class="ok" x="172" y="440" width="176" height="44" rx="8"/>
  <text class="label" x="206" y="468">Allow</text>
  <rect class="warn" x="392" y="440" width="176" height="44" rx="8"/>
  <text class="label" x="424" y="468">Review</text>
  <rect class="stop" x="612" y="440" width="176" height="44" rx="8"/>
  <text class="label" x="652" y="468">Block</text>
</svg>
