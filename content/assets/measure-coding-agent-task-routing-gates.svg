<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title id="title">Coding-agent routing policy comparison</title>
  <desc id="desc">Bar chart comparing delegate-all, human-review-only, and task-gate routing policies by pass rate, route match, compute credits, and review hours.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="960" height="540" fill="#080c12"/>
    <rect width="960" height="540" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <text x="36" y="46" class="title">Coding-agent task routing gates</text>
  <text x="36" y="72" class="subtitle">Higher pass and match are better; lower credits and review hours are better.</text>
  <g transform="translate(0 92)">
        <text x="36" y="24" class="label">delegateAll</text>
        <rect x="170" y="0" width="110" height="18" rx="3" fill="#43d6a0"/>
        <text x="290" y="14" class="metric" textLength="1" lengthAdjust="spacingAndGlyphs">pass 0.438</text>
        <rect x="170" y="28" width="110" height="18" rx="3" fill="#52dcef"/>
        <text x="290" y="42" class="metric" textLength="24" lengthAdjust="spacingAndGlyphs">match 0.438</text>
        <rect x="170" y="56" width="250" height="18" rx="3" fill="#b86125"/>
        <text x="430" y="70" class="metric">credits 42.88</text>
        <rect x="170" y="84" width="156" height="18" rx="3" fill="#9b87ff"/>
        <text x="336" y="98" class="metric" textLength="38" lengthAdjust="spacingAndGlyphs">review 18.21h</text>
      </g>
      <g transform="translate(0 202)">
        <text x="36" y="24" class="label">humanReviewOnly</text>
        <rect x="170" y="0" width="141" height="18" rx="3" fill="#43d6a0"/>
        <text x="321" y="14" class="metric" textLength="9" lengthAdjust="spacingAndGlyphs">pass 0.563</text>
        <rect x="170" y="28" width="156" height="18" rx="3" fill="#52dcef"/>
        <text x="336" y="42" class="metric" textLength="10" lengthAdjust="spacingAndGlyphs">match 0.625</text>
        <rect x="170" y="56" width="196" height="18" rx="3" fill="#b86125"/>
        <text x="376" y="70" class="metric" textLength="32" lengthAdjust="spacingAndGlyphs">credits 33.67</text>
        <rect x="170" y="84" width="250" height="18" rx="3" fill="#9b87ff"/>
        <text x="430" y="98" class="metric">review 29.21h</text>
      </g>
      <g transform="translate(0 312)">
        <text x="36" y="24" class="label">taskGate</text>
        <rect x="170" y="0" width="172" height="18" rx="3" fill="#43d6a0"/>
        <text x="352" y="14" class="metric">pass 0.688</text>
        <rect x="170" y="28" width="188" height="18" rx="3" fill="#52dcef"/>
        <text x="368" y="42" class="metric">match 0.75</text>
        <rect x="170" y="56" width="201" height="18" rx="3" fill="#b86125"/>
        <text x="381" y="70" class="metric" textLength="27" lengthAdjust="spacingAndGlyphs">credits 34.45</text>
        <rect x="170" y="84" width="216" height="18" rx="3" fill="#9b87ff"/>
        <text x="396" y="98" class="metric" textLength="12" lengthAdjust="spacingAndGlyphs">review 25.21h</text>
      </g>
  <g transform="translate(36 470)">
    <rect width="16" height="16" fill="#43d6a0" rx="2"/><text x="24" y="13" class="legend">pass rate</text>
    <rect x="132" width="16" height="16" fill="#52dcef" rx="2"/><text x="156" y="13" class="legend">route match</text>
    <rect x="286" width="16" height="16" fill="#b86125" rx="2"/><text x="310" y="13" class="legend" textLength="1" lengthAdjust="spacingAndGlyphs">compute credits</text>
    <rect x="470" width="16" height="16" fill="#9b87ff" rx="2"/><text x="494" y="13" class="legend">review hours</text>
  </g>
  <style>
    .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .subtitle, .legend { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4f5b66; }
    .label { font: 650 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .metric { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #28323c; }
  </style>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 11px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
    <line x1="24" y1="116" x2="936" y2="116" stroke="#2a3641" stroke-width="1"/>
    <circle cx="28" cy="26" r="4" fill="#b8f56a"/>
    <circle cx="42" cy="26" r="4" fill="#52dcef"/>
    <text class="fieldbook-kicker" x="936" y="30" text-anchor="end">AI SYSTEMS FIELDBOOK / MEASURED RESULTS</text>
    <rect x="0.5" y="0.5" width="959" height="539" rx="8" fill="none" stroke="#2b3742" stroke-width="1"/>
  </g>
</svg>
