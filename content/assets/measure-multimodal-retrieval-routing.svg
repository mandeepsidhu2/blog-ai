        <text x="776" y="424" text-anchor="middle" font-size="15" fill="#334155">Precision</text>
  <text x="208" y="470" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">textOnlyIndex</text><text x="468" y="470" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">unifiedUngated</text><text x="728" y="470" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">modalityRouted</text>
  <text x="56" y="515" font-size="16" fill="#475569">Gate result: modality-routed retrieval reached the highest pass rate with zero sensitivity violations.</text>
