  <text x="72" y="394" text-anchor="end" font-size="15" fill="#64748b">0</text>
  <line x1="88" y1="260" x2="890" y2="260" stroke="#334250" stroke-width="1" stroke-dasharray="6 6"/>

        <rect x="130" y="353" width="36" height="37" fill="#43d6a0" rx="4"/>
        <text x="148" y="343" text-anchor="middle" font-size="18" fill="#172033">0.143</text>
        <text x="148" y="424" text-anchor="middle" font-size="15" fill="#334155">Pass</text>
        <rect x="184" y="260" width="36" height="130" fill="#52dcef" rx="4"/>
        <text x="202" y="250" text-anchor="middle" font-size="18" fill="#172033">0.5</text>
        <text x="202" y="424" text-anchor="middle" font-size="15" fill="#334155">Recall</text>
        <rect x="238" y="303" width="36" height="87" fill="#a05d18" rx="4"/>
