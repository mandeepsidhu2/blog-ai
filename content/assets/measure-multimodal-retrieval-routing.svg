  <line x1="88" y1="260" x2="890" y2="260" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 6"/>
  
        <rect x="130" y="353" width="36" height="37" fill="#1f7a6d" rx="4"/>
