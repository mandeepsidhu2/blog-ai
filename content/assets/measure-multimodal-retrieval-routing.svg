        <text x="256" y="424" text-anchor="middle" font-size="15" fill="#334155">Precision</text>
        <rect x="390" y="186" width="36" height="204" fill="#43d6a0" rx="4"/>
        <text x="408" y="176" text-anchor="middle" font-size="18" fill="#172033">0.786</text>
        <text x="408" y="424" text-anchor="middle" font-size="15" fill="#334155">Pass</text>
        <rect x="444" y="130" width="36" height="260" fill="#52dcef" rx="4"/>
        <text x="462" y="120" text-anchor="middle" font-size="18" fill="#172033">1</text>
        <text x="462" y="424" text-anchor="middle" font-size="15" fill="#334155">Recall</text>
        <rect x="498" y="251" width="36" height="139" fill="#a05d18" rx="4"/>
        <text x="516" y="241" text-anchor="middle" font-size="18" fill="#172033">0.536</text>
        <text x="516" y="424" text-anchor="middle" font-size="15" fill="#334155">Precision</text>
        <rect x="650" y="130" width="36" height="260" fill="#43d6a0" rx="4"/>
        <text x="668" y="120" text-anchor="middle" font-size="18" fill="#172033">1</text>
        <text x="668" y="424" text-anchor="middle" font-size="15" fill="#334155">Pass</text>
        <rect x="704" y="130" width="36" height="260" fill="#52dcef" rx="4"/>
        <text x="722" y="120" text-anchor="middle" font-size="18" fill="#172033">1</text>
        <text x="722" y="424" text-anchor="middle" font-size="15" fill="#334155">Recall</text>
