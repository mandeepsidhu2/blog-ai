<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="title desc" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title id="title">Multimodal retrieval routing experiment results</title>
  <desc id="desc">Bar chart comparing pass rate, recall, and modality precision for text-only indexing, unified untyped retrieval, and modality-routed retrieval.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="960" height="540" fill="#080c12"/>
    <rect width="960" height="540" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <text x="56" y="62" font-size="34" font-weight="800" fill="#172033">Multimodal Retrieval Gates</text>
  <text x="56" y="100" font-size="18" fill="#475569">Controlled retrieval run across 14 mixed-modality queries</text>
  <line x1="88" y1="390" x2="890" y2="390" stroke="#40515f" stroke-width="2"/>
  <line x1="88" y1="130" x2="88" y2="390" stroke="#40515f" stroke-width="2"/>
