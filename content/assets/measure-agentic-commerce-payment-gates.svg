<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" data-visual-quality="publication" data-visual-system="fieldbook-v2" data-text-fit="bounded">
  <title>Agentic commerce payment gate results</title>
  <desc>Bar chart comparing saved card delegation, merchant-scoped tokens, and mandate payment gates by pass rate, unauthorized charges, and mandate violations.</desc>
  <!-- fieldbook-visual-system:v2 -->
  <defs id="fieldbook-v2-defs">
    <pattern id="fieldbook-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#27323d" stroke-width="1"/>
    </pattern>
  </defs>
  <g aria-hidden="true" data-fieldbook-frame="background">
    <rect width="960" height="540" fill="#080c12"/>
    <rect width="960" height="540" fill="url(#fieldbook-grid)" opacity="0.32"/>
  </g>

  <rect x="48" y="44" width="864" height="444" rx="8" fill="#121a23" stroke="#334250"/>
  <text x="84" y="90" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#111827">Payment authorization gates for agents</text>
  <text x="84" y="122" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#475569">Pass rate improves only when the payment mandate is checked at runtime.</text>
  <line x1="96" y1="332" x2="864" y2="332" stroke="#40515f"/>
  <line x1="96" y1="112" x2="96" y2="332" stroke="#40515f"/>
  <text x="78" y="336" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569">0</text>
  <text x="78" y="116" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569">1.0 / 8</text>

    <g>
      <text x="200" y="398" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827">saved Card Delegation</text>
      <rect x="130" y="290.75" width="42" height="41.25" fill="#b8f56a"/>
      <rect x="182" y="112" width="42" height="220" fill="#ff657a"/>
      <rect x="234" y="236" width="42" height="96" fill="#ffb84d"/>
      <text x="151" y="280.75" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#111827">0.19</text>
      <text x="203" y="102" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#111827">10</text>
      <text x="255" y="226" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#111827">4</text>
    </g>
    <g>
      <text x="450" y="398" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827">merchant Scoped Token</text>
      <rect x="380" y="167" width="42" height="165" fill="#b8f56a"/>
      <rect x="432" y="220" width="42" height="112" fill="#ff657a"/>
      <rect x="484" y="188" width="42" height="144" fill="#ffb84d"/>
      <text x="401" y="157" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#111827">0.75</text>
      <text x="453" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#111827">4</text>
      <text x="505" y="178" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#111827">6</text>
    </g>
    <g>
      <text x="700" y="398" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827">mandate Payment Gate</text>
      <rect x="630" y="112" width="42" height="220" fill="#b8f56a"/>
      <rect x="682" y="332" width="42" height="0" fill="#ff657a"/>
      <rect x="734" y="332" width="42" height="0" fill="#ffb84d"/>
      <text x="651" y="102" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#111827">1.00</text>
      <text x="703" y="322" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#111827">0</text>
      <text x="755" y="322" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#111827">0</text>
    </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="#111827">
    <rect x="160" y="436" width="18" height="18" fill="#b8f56a"/><text x="186" y="451">pass rate</text>
    <rect x="306" y="436" width="18" height="18" fill="#ff657a"/><text x="332" y="451">unauthorized charges</text>
    <rect x="520" y="436" width="18" height="18" fill="#ffb84d"/><text x="546" y="451">mandate violations</text>
  </g>
  <style id="fieldbook-v2-theme">
    text { fill: #e4eaed !important; font-family: Inter, system-ui, sans-serif !important; letter-spacing: 0; }
    .title { fill: #f7faf9 !important; font-weight: 750 !important; }
    .subtitle, .sub, .note, .axis, .legend, .body, .small { fill: #8d9aa6 !important; }
    .label, .smallTitle, .metric, .headtext { fill: #e7edef !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
    .fieldbook-kicker { fill: #73818e !important; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 11px !important; font-weight: 750 !important; }
  </style>
  <g aria-hidden="true" data-fieldbook-frame="overlay">
    <line x1="24" y1="116" x2="936" y2="116" stroke="#2a3641" stroke-width="1"/>
    <circle cx="28" cy="26" r="4" fill="#b8f56a"/>
    <circle cx="42" cy="26" r="4" fill="#52dcef"/>
    <text class="fieldbook-kicker" x="936" y="30" text-anchor="end">AI SYSTEMS FIELDBOOK / MEASURED RESULTS</text>
    <rect x="0.5" y="0.5" width="959" height="539" rx="8" fill="none" stroke="#2b3742" stroke-width="1"/>
  </g>
</svg>
